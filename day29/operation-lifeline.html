<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Operation Lifeline: Supply Chain Crisis Lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #070B16;
    --surface: #0F1629;
    --surface2: #162038;
    --surface3: #1C2A47;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --blue: #3B82F6;
    --blue-glow: rgba(59,130,246,0.3);
    --blue-light: #60A5FA;
    --amber: #F59E0B;
    --amber-glow: rgba(245,158,11,0.25);
    --emerald: #10B981;
    --emerald-glow: rgba(16,185,129,0.25);
    --rose: #F43F5E;
    --rose-glow: rgba(244,63,94,0.25);
    --violet: #8B5CF6;
    --violet-glow: rgba(139,92,246,0.25);
    --cyan: #06B6D4;
    --text: #F0F4FF;
    --text-muted: #8892AA;
    --text-dim: #4A5568;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html { font-size: 16px; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  #root { min-height: 100vh; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  /* Animations */
  @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideIn { from { opacity:0; transform:translateX(-30px); } to { opacity:1; transform:translateX(0); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes barFill { from { width:0%; } to { width:var(--target-width); } }
  @keyframes glow { 0%,100% { box-shadow: 0 0 20px var(--glow-color,var(--blue-glow)); } 50% { box-shadow: 0 0 40px var(--glow-color,var(--blue-glow)); } }
  @keyframes ticker { 0% { transform:translateX(100%); } 100% { transform:translateX(-100%); } }
  @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
  @keyframes countUp { from { opacity:0; } to { opacity:1; } }
  @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }

  .fade-in { animation: fadeIn 0.5s ease forwards; }
  .slide-in { animation: slideIn 0.4s ease forwards; }

  /* Layout */
  .screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    animation: fadeIn 0.4s ease;
  }

  .container { width: 100%; max-width: 900px; }
  .container-wide { width: 100%; max-width: 1100px; }

  /* Header bar */
  .top-bar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .top-bar-logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--blue-light);
  }

  .ticker-wrap {
    flex: 1;
    overflow: hidden;
    margin: 0 24px;
    height: 20px;
  }

  .ticker {
    display: inline-block;
    white-space: nowrap;
    animation: ticker 28s linear infinite;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--amber);
    letter-spacing: 0.05em;
  }

  .step-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  }

  .card:hover { border-color: var(--border2); }

  .card-sm {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    transition: all 0.2s;
  }

  .card-glow-blue { box-shadow: 0 0 0 1px var(--blue), 0 0 30px var(--blue-glow); border-color: var(--blue) !important; }
  .card-glow-amber { box-shadow: 0 0 0 1px var(--amber), 0 0 30px var(--amber-glow); border-color: var(--amber) !important; }
  .card-glow-rose { box-shadow: 0 0 0 1px var(--rose), 0 0 30px var(--rose-glow); border-color: var(--rose) !important; }
  .card-glow-emerald { box-shadow: 0 0 0 1px var(--emerald), 0 0 30px var(--emerald-glow); border-color: var(--emerald) !important; }
  .card-glow-violet { box-shadow: 0 0 0 1px var(--violet), 0 0 30px var(--violet-glow); border-color: var(--violet) !important; }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

  @media (max-width: 700px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }
  @media (max-width: 900px) {
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(2, 1fr); }
  }

  /* Typography */
  h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; line-height: 1.1; }
  h2 { font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 800; line-height: 1.2; }
  h3 { font-size: 1.1rem; font-weight: 700; }
  h4 { font-size: 0.9rem; font-weight: 600; }

  .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .mono {
    font-family: 'JetBrains Mono', monospace;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    transition: all 0.2s;
    user-select: none;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--blue), #1D4ED8);
    color: #fff;
    box-shadow: 0 4px 20px var(--blue-glow);
  }
  .btn-primary:hover { box-shadow: 0 6px 30px rgba(59,130,246,0.5); transform: translateY(-1px); }

  .btn-amber {
    background: linear-gradient(135deg, var(--amber), #D97706);
    color: #000;
    box-shadow: 0 4px 20px var(--amber-glow);
  }
  .btn-amber:hover { box-shadow: 0 6px 30px rgba(245,158,11,0.4); transform: translateY(-1px); }

  .btn-emerald {
    background: linear-gradient(135deg, var(--emerald), #059669);
    color: #fff;
    box-shadow: 0 4px 20px var(--emerald-glow);
  }
  .btn-emerald:hover { box-shadow: 0 6px 30px rgba(16,185,129,0.4); transform: translateY(-1px); }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface3); border-color: var(--border2); }

  .btn-outline-blue {
    background: transparent;
    color: var(--blue-light);
    border: 1.5px solid var(--blue);
  }
  .btn-outline-blue:hover { background: var(--blue-glow); }

  .btn-lg { padding: 16px 36px; font-size: 17px; }
  .btn-sm { padding: 8px 16px; font-size: 13px; }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* Selectable action cards */
  .action-card {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    position: relative;
  }

  .action-card:hover:not(.disabled) {
    border-color: var(--blue);
    background: var(--surface3);
    transform: translateY(-2px);
  }

  .action-card.selected {
    border-color: var(--blue);
    background: rgba(59,130,246,0.1);
    box-shadow: 0 0 20px var(--blue-glow);
  }

  .action-card.selected::before {
    content: '✓';
    position: absolute;
    top: 12px; right: 12px;
    width: 22px; height: 22px;
    background: var(--blue);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: white;
  }

  .action-card.disabled { opacity: 0.45; cursor: not-allowed; }

  /* Progress bar */
  .prog-wrap {
    background: var(--surface3);
    border-radius: 999px;
    height: 10px;
    overflow: hidden;
    margin-top: 6px;
  }

  .prog-bar {
    height: 100%;
    border-radius: 999px;
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .prog-bar-blue { background: linear-gradient(90deg, var(--blue), var(--blue-light)); }
  .prog-bar-amber { background: linear-gradient(90deg, #D97706, var(--amber)); }
  .prog-bar-emerald { background: linear-gradient(90deg, #059669, var(--emerald)); }
  .prog-bar-rose { background: linear-gradient(90deg, #BE123C, var(--rose)); }
  .prog-bar-violet { background: linear-gradient(90deg, #6D28D9, var(--violet)); }
  .prog-bar-cyan { background: linear-gradient(90deg, #0891B2, var(--cyan)); }

  /* Tags / Badges */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .tag-blue { background: rgba(59,130,246,0.15); color: var(--blue-light); border: 1px solid rgba(59,130,246,0.3); }
  .tag-amber { background: rgba(245,158,11,0.15); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
  .tag-rose { background: rgba(244,63,94,0.15); color: #FB7185; border: 1px solid rgba(244,63,94,0.3); }
  .tag-emerald { background: rgba(16,185,129,0.15); color: var(--emerald); border: 1px solid rgba(16,185,129,0.3); }
  .tag-violet { background: rgba(139,92,246,0.15); color: #A78BFA; border: 1px solid rgba(139,92,246,0.3); }
  .tag-gray { background: rgba(255,255,255,0.06); color: var(--text-muted); border: 1px solid var(--border); }

  /* Stat display */
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
  }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* Icon circles */
  .icon-circle {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  /* Negotiation */
  .neg-choice {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 10px;
  }
  .neg-choice:hover { border-color: var(--violet); background: var(--surface3); transform: translateX(4px); }

  /* CEO question */
  .ceo-choice {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 10px;
  }
  .ceo-choice:hover { border-color: var(--cyan); background: var(--surface3); }
  .ceo-choice.correct { border-color: var(--emerald) !important; background: rgba(16,185,129,0.1) !important; }
  .ceo-choice.wrong { border-color: var(--rose) !important; background: rgba(244,63,94,0.1) !important; }

  /* AI card */
  .ai-card {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 18px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ai-card:hover:not(.disabled) { border-color: var(--violet); transform: translateY(-2px); }
  .ai-card.selected { border-color: var(--violet); background: rgba(139,92,246,0.1); box-shadow: 0 0 20px var(--violet-glow); }

  /* Score ring */
  .score-ring {
    position: relative;
    width: 160px; height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }

  .score-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .score-ring-inner {
    text-align: center;
    z-index: 1;
  }

  /* Welcome specific */
  .hero-glow {
    position: absolute;
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(59,130,246,0.15) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .crisis-pulse {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--rose);
    border-radius: 50%;
    animation: pulse 1.2s ease infinite;
    margin-right: 6px;
  }

  /* Feedback box */
  .feedback-box {
    background: var(--surface2);
    border-left: 3px solid var(--blue);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 14px 18px;
    margin: 10px 0;
    font-size: 14px;
    line-height: 1.6;
  }

  .feedback-box.warning { border-left-color: var(--amber); }
  .feedback-box.danger { border-left-color: var(--rose); }
  .feedback-box.success { border-left-color: var(--emerald); }
  .feedback-box.violet { border-left-color: var(--violet); }

  /* Tooltip hint */
  .hint {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: 6px;
  }

  .context-box {
    background: rgba(59,130,246,0.06);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 14px;
    color: #94B4E0;
    line-height: 1.6;
  }

  /* Why box */
  .why-box {
    background: rgba(139,92,246,0.06);
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    margin-top: 8px;
    font-size: 13px;
    color: #C4B5FD;
    line-height: 1.5;
  }

  /* Spacers */
  .mt8 { margin-top: 8px; }
  .mt12 { margin-top: 12px; }
  .mt16 { margin-top: 16px; }
  .mt20 { margin-top: 20px; }
  .mt24 { margin-top: 24px; }
  .mt32 { margin-top: 32px; }
  .mt40 { margin-top: 40px; }
  .mb8 { margin-bottom: 8px; }
  .mb12 { margin-bottom: 12px; }
  .mb16 { margin-bottom: 16px; }
  .mb20 { margin-bottom: 20px; }
  .mb24 { margin-bottom: 24px; }
  .gap8 { gap: 8px; }
  .gap12 { gap: 12px; }
  .gap16 { gap: 16px; }

  /* Flex utils */
  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .items-center { align-items: center; }
  .items-start { align-items: flex-start; }
  .justify-between { justify-content: space-between; }
  .justify-center { justify-content: center; }
  .flex-wrap { flex-wrap: wrap; }
  .flex-1 { flex: 1; }
  .text-center { text-align: center; }
  .text-right { text-align: right; }

  /* Colors */
  .text-blue { color: var(--blue-light); }
  .text-amber { color: var(--amber); }
  .text-rose { color: #FB7185; }
  .text-emerald { color: var(--emerald); }
  .text-violet { color: #A78BFA; }
  .text-cyan { color: var(--cyan); }
  .text-muted { color: var(--text-muted); }
  .text-dim { color: var(--text-dim); }
  .text-white { color: #fff; }

  .font-bold { font-weight: 700; }
  .font-medium { font-weight: 500; }

  /* Negotiation trust bars */
  .neg-stat { margin-bottom: 12px; }
  .neg-stat-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .neg-stat-label { font-size: 13px; color: var(--text-muted); }
  .neg-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  /* War room metrics */
  .metric-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
  }

  /* Final score display */
  .score-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .score-item:last-child { border-bottom: none; }

  /* Lesson card */
  .lesson {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .lesson:last-child { border-bottom: none; }
  .lesson-num {
    width: 26px; height: 26px;
    min-width: 26px;
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--blue-light);
  }

  /* Crisis urgency */
  .urgency-high { color: var(--rose); }
  .urgency-medium { color: var(--amber); }
  .urgency-low { color: var(--emerald); }

  /* Selection counter */
  .selection-counter {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
  }

  /* Timeline bar for steps */
  .step-trail {
    display: flex;
    align-items: center;
    gap: 0;
    margin: 20px 0 32px;
  }
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .step-dot.done { background: var(--blue); color: white; }
  .step-dot.active { background: var(--amber); color: black; animation: glow 2s infinite; --glow-color: var(--amber-glow); }
  .step-dot.future { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
  .step-line { flex: 1; height: 2px; background: var(--border); }
  .step-line.done { background: var(--blue); }

  /* Action effect pills */
  .effect-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
    margin: 2px;
  }
  .effect-up { background: rgba(16,185,129,0.12); color: var(--emerald); }
  .effect-down { background: rgba(244,63,94,0.12); color: #FB7185; }

  /* Replay */
  .replay-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1.5px solid var(--border2);
    border-radius: 10px;
    padding: 12px 24px;
    cursor: pointer;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .replay-btn:hover { background: var(--surface3); border-color: var(--blue); color: var(--blue-light); transform: translateY(-1px); }

  /* CEO score reveal */
  .q-result-correct { color: var(--emerald); font-size: 13px; margin-top: 6px; }
  .q-result-wrong { color: #FB7185; font-size: 13px; margin-top: 6px; }

  /* Section titles */
  .section-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue-light);
    margin-bottom: 6px;
  }

  /* Company card specific */
  .company-kpi {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .company-kpi .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
  }
  .company-kpi .key {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Overflow hidden for slide containers */
  .overflow-hidden { overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── DATA GENERATION ───────────────────────────────────────────────────────

// ─── UTILITY FUNCTIONS ─────────────────────────────────────────────────────

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

function generateCompany() {
  const industry = rand(INDUSTRIES);
  const revenue = randInt(200, 4800);
  const factories = randInt(2, 12);
  const warehouses = randInt(3, 18);
  const suppliers = randInt(8, 60);
  const inventoryDays = randInt(14, 90);
  const leadTime = randInt(7, 45);
  const operatingCountries = randInt(3, 22);
  const name = `${rand(COMPANY_PREFIXES)} ${rand(COMPANY_SUFFIXES)}`;
  const employees = randInt(800, 45000);
  const founded = randInt(1952, 2008);
  return { name, industry, revenue, factories, warehouses, suppliers, inventoryDays, leadTime, operatingCountries, employees, founded };
}

function generateCrisis(company) {
  const crisis = { ...rand(CRISES) };
  crisis.description = crisis.description.replace('{country}', rand(COUNTRIES));
  return crisis;
}

function generateMetrics() {
  return {
    cost: randInt(55, 75),
    inventory: randInt(50, 70),
    profit: randInt(55, 72),
    deliverySpeed: randInt(50, 70),
    satisfaction: randInt(55, 75),
  };
}

function applyActions(base, selectedActions) {
  let result = { ...base };
  selectedActions.forEach(actionId => {
    const action = RESPONSE_ACTIONS.find(a => a.id === actionId);
    if (!action) return;
    result.cost = clamp(result.cost + action.cost, 0, 100);
    result.inventory = clamp(result.inventory + action.inventory, 0, 100);
    result.profit = clamp(result.profit + action.profit, 0, 100);
    result.deliverySpeed = clamp(result.deliverySpeed + action.deliverySpeed, 0, 100);
    result.satisfaction = clamp(result.satisfaction + action.satisfaction, 0, 100);
  });
  return result;
}

function scoreColor(val) {
  if (val >= 75) return 'var(--emerald)';
  if (val >= 50) return 'var(--amber)';
  return 'var(--rose)';
}

function scoreLabel(val) {
  if (val >= 80) return 'Exceptional';
  if (val >= 65) return 'Strong';
  if (val >= 50) return 'Adequate';
  if (val >= 35) return 'Weak';
  return 'Critical';
}

// ─── COMPONENTS ────────────────────────────────────────────────────────────

function ProgressBar({ value, color = 'blue', animated = true }) {
  const [width, setWidth] = useState(0);
  useEffect(() => {
    const t = setTimeout(() => setWidth(value), 80);
    return () => clearTimeout(t);
  }, [value]);
  return (
    <div className="prog-wrap">
      <div
        className={`prog-bar prog-bar-${color}`}
        style={{ width: `${width}%`, transition: animated ? 'width 1.2s cubic-bezier(0.4,0,0.2,1)' : 'none' }}
      />
    </div>
  );
}

function MetricRow({ label, value, color, showNumber = true }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div className="flex justify-between items-center" style={{ marginBottom: 4 }}>
        <span style={{ fontSize: 13, color: 'var(--text-muted)' }}>{label}</span>
        {showNumber && <span className="mono" style={{ fontSize: 13, color: 'var(--text)', fontWeight: 600 }}>{value}%</span>}
      </div>
      <ProgressBar value={value} color={color} />
    </div>
  );
}

function Tag({ children, type = 'gray' }) {
  return <span className={`tag tag-${type}`}>{children}</span>;
}

function StepTrail({ current, total }) {
  const labels = ['Briefing', 'Crisis', 'War Room', 'Negotiate', 'Boardroom', 'AI Invest', 'Results'];
  return (
    <div className="step-trail">
      {labels.map((label, i) => (
        <React.Fragment key={i}>
          {i > 0 && <div className={`step-line${i <= current ? ' done' : ''}`} />}
          <div
            className={`step-dot${i < current ? ' done' : i === current ? ' active' : ' future'}`}
            title={label}
          >
            {i < current ? '✓' : i + 1}
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

function TopBar({ step, company, crisis }) {
  const tickerItems = company ? [
    `⚡ ${company.name} — ${company.industry.emoji} ${company.industry.name}`,
    `📦 ${company.warehouses} Warehouses Active`,
    `🔗 ${company.suppliers} Active Suppliers`,
    crisis ? `🚨 ACTIVE CRISIS: ${crisis.type} — Urgency: ${crisis.urgency}` : '',
    `💰 Revenue: $${company.revenue}M`,
    `🌍 Operating in ${company.operatingCountries} countries`,
  ].filter(Boolean).join('   •   ') : 'Operation Lifeline: Supply Chain Crisis Lab';

  return (
    <div className="top-bar">
      <div className="top-bar-logo">⚡ Op Lifeline</div>
      <div className="ticker-wrap">
        <span className="ticker">{tickerItems} &nbsp;&nbsp;&nbsp; {tickerItems}</span>
      </div>
      {step >= 0 && <div className="step-badge">Step {step + 1}/7</div>}
    </div>
  );
}

function WarRoomScreen({ company, crisis, baseMetrics, onNext }) {
  const [selected, setSelected] = useState([]);
  const [simulated, setSimulated] = useState(false);
  const [finalMetrics, setFinalMetrics] = useState(null);

  const MAX_SELECT = 3;

  const toggle = (id) => {
    if (simulated) return;
    if (selected.includes(id)) {
      setSelected(selected.filter(s => s !== id));
    } else if (selected.length < MAX_SELECT) {
      setSelected([...selected, id]);
    }
  };

  const simulate = () => {
    const result = applyActions(baseMetrics, selected);
    setFinalMetrics(result);
    setSimulated(true);
  };

  const metricColor = (key) => {
    const map = { cost: 'blue', inventory: 'emerald', profit: 'amber', deliverySpeed: 'violet', satisfaction: 'rose' };
    return map[key] || 'blue';
  };

  const metricLabel = (key) => {
    const map = { cost: 'Cost Efficiency', inventory: 'Inventory Level', profit: 'Profit Margin', deliverySpeed: 'Delivery Speed', satisfaction: 'Customer Satisfaction' };
    return map[key];
  };

  return (
    <div className="screen">
      <div className="container-wide">
        <div className="container" style={{ paddingLeft: 0, paddingRight: 0 }}>
          <StepTrail current={2} total={7} />

        <div className="context-box" style={{ maxWidth: 860 }}>
          You have 6 response options available, but resources and time limit you to <strong style={{ color: 'var(--blue-light)' }}>3 actions</strong>. Each action has tradeoffs — what you gain in one area, you often sacrifice in another. Read each carefully before committing.
        </div>

        <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 16 }}>
          <div className="selection-counter">
            <span className="mono" style={{ color: selected.length === MAX_SELECT ? 'var(--emerald)' : 'var(--amber)' }}>
              {selected.length}/{MAX_SELECT}
            </span>
            Actions Selected
          </div>
        </div>

        <div className="grid-2" style={{ gap: 14, marginBottom: 24 }}>
          {RESPONSE_ACTIONS.map((action) => {
            const isSelected = selected.includes(action.id);
            const isDisabled = !isSelected && selected.length >= MAX_SELECT;
            return (
              <div
                key={action.id}
                className={`action-card${isSelected ? ' selected' : ''}${isDisabled ? ' disabled' : ''}`}

                  <div style={{ fontSize: 26, flexShrink: 0 }}>{action.emoji}</div>

                    <div style={{ fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.5, marginBottom: 8 }}>{action.desc}</div>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                      {action.effects.map((e, i) => {
                        const isUp = e.includes('↑') || e.includes('Low');

                          <span key={i} className={`effect-pill ${isUp ? 'effect-up' : 'effect-down'}`}>
                            {e}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                </div>
                <div className="why-box" style={{ marginTop: 10 }}>
                  <strong>Why this works:</strong> {action.why}
                </div>
              </div>
            );

        {!simulated ? (
          <div className="flex justify-center mb24">
            <button

              onClick={simulate}

          </div>

          <div className="card card-glow-emerald" style={{ marginBottom: 24 }}>
            <h3 style={{ marginBottom: 4 }}>📊 Simulated Outcomes</h3>

          </div>
        )}

        {simulated && (
          <div className="flex justify-center">
            <button className="btn btn-primary btn-lg" onClick={() => onNext(selected, finalMetrics)}>
              Enter Supplier Negotiation →
            </button>
          </div>
        )}

    </div>
  );

function NegotiationScreen({ onNext }) {
  const [round, setRound] = useState(0);
  const [stats, setStats] = useState({ trust: 50, price: 50, leadTime: 50 });
  const [scores, setScores] = useState([]);
  const [chosen, setChosen] = useState(null);
  const [showFeedback, setShowFeedback] = useState(false);

  const currentRound = NEG_ROUNDS[round];

  const choose = (choice) => {
    if (showFeedback) return;
    setChosen(choice);
    setStats(prev => ({
      trust: clamp(prev.trust + choice.trust, 0, 100),
      price: clamp(prev.price + choice.price, 0, 100),
      leadTime: clamp(prev.leadTime + choice.leadTime, 0, 100),
    }));
    setScores(prev => [...prev, choice.score]);
    setShowFeedback(true);
  };

  const nextRound = () => {
    if (round < NEG_ROUNDS.length - 1) {
      setRound(round + 1);
      setChosen(null);
      setShowFeedback(false);
    } else {
      const total = scores.reduce((a, b) => a + b, 0) + (chosen ? chosen.score : 0);
      const negScore = Math.round((total / (NEG_ROUNDS.length * 5)) * 100);
      onNext(negScore, stats);
    }
  };

  const totalScore = scores.reduce((a, b) => a + b, 0) + (chosen ? chosen.score : 0);

  return (
    <div className="screen">
      <div className="container">
        <StepTrail current={3} total={7} />

        <div className="section-eyebrow">Supplier Negotiation • Round {round + 1} of {NEG_ROUNDS.length}</div>
        <h2 style={{ marginBottom: 8 }}>{currentRound.title}</h2>

        <div className="grid-2" style={{ marginBottom: 20 }}>
          <div>
            <div className="context-box" style={{ margin: 0 }}>
              <strong>Situation:</strong> {currentRound.situation}
            </div>
          </div>
          <div className="card-sm">
            <div className="label mb12">Negotiation Metrics</div>
            {[
              { label: 'Supplier Trust', val: stats.trust, color: 'blue' },
              { label: 'Price Position', val: stats.price, color: 'emerald' },
              { label: 'Lead Time Agreement', val: stats.leadTime, color: 'violet' },
            ].map((m, i) => (
              <div key={i} className="neg-stat">
                <div className="neg-stat-row">
                  <span className="neg-stat-label">{m.label}</span>
                  <span className="neg-stat-val" style={{ color: 'var(--text)' }}>{m.val}</span>
                </div>
                <ProgressBar value={m.val} color={m.color} />
              </div>
            ))}
          </div>
        </div>

        <div className="card-sm mb16">
          <div style={{ fontWeight: 700, marginBottom: 16, color: 'var(--amber)' }}>❓ {currentRound.question}</div>
          {currentRound.choices.map((choice, i) => (
            <div
              key={i}
              className={`neg-choice${chosen === choice ? ' selected' : ''}`}
              style={chosen === choice ? { borderColor: 'var(--violet)', background: 'rgba(139,92,246,0.1)' } : {}}
              onClick={() => !showFeedback && choose(choice)}
            >
              <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                <span style={{ color: 'var(--violet)', fontWeight: 700, flexShrink: 0 }}>{String.fromCharCode(65 + i)}.</span>
                <span style={{ fontSize: 14, lineHeight: 1.5 }}>{choice.text}</span>
              </div>
            </div>
          ))}
        </div>

        {showFeedback && chosen && (
          <div className="card-sm card-glow-violet mb20" style={{ animation: 'fadeIn 0.3s ease' }}>
            <div className="flex items-center gap8 mb8">
              <span style={{ fontSize: 18 }}>
                {chosen.score >= 4 ? '✅' : chosen.score >= 3 ? '⚠️' : '❌'}
              </span>
              <strong>
                {chosen.score >= 4 ? 'Excellent Move' : chosen.score >= 3 ? 'Acceptable Choice' : 'Suboptimal Decision'}
                {' '}<span className="mono" style={{ color: 'var(--violet)' }}>(+{chosen.score}/5 pts)</span>
              </strong>
            </div>
            <p style={{ fontSize: 13, lineHeight: 1.6, color: 'var(--text-muted)' }}>{chosen.feedback}</p>
          </div>
        )}

        {showFeedback && (
          <div className="flex justify-center">
            <button className="btn btn-primary" onClick={nextRound}>
              {round < NEG_ROUNDS.length - 1 ? `Round ${round + 2}: ${NEG_ROUNDS[round + 1].title} →` : 'Enter CEO Boardroom →'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function BoardroomScreen({ onNext }) {
  const [qIndex, setQIndex] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [chosen, setChosen] = useState(null);
  const [showResult, setShowResult] = useState(false);

  const current = CEO_QUESTIONS[qIndex];

  const choose = (choice) => {
    if (showResult) return;
    setChosen(choice);
    setShowResult(true);
  };

  const next = () => {
    const newAnswers = [...answers, chosen.correct];
    if (qIndex < CEO_QUESTIONS.length - 1) {
      setAnswers(newAnswers);
      setQIndex(qIndex + 1);
      setChosen(null);
      setShowResult(false);
    } else {
      const correct = newAnswers.filter(Boolean).length;
      const score = Math.round((correct / CEO_QUESTIONS.length) * 100);
      onNext(score);
    }
  };

  return (
    <div className="screen">
      <div className="container">
        <StepTrail current={4} total={7} />

        <div className="section-eyebrow">CEO Boardroom • Question {qIndex + 1} of {CEO_QUESTIONS.length}</div>
        <h2 style={{ marginBottom: 8 }}>Executive Decision Making</h2>
        <div className="context-box mb20">
          The board is watching. These questions assess how you think as a senior leader during a supply chain crisis — not just operationally, but strategically and ethically.

        <div className="card card-glow-cyan mb16" style={{ '--glow-color': 'rgba(6,182,212,0.2)' }}>
          <div className="flex items-start gap12 mb16">
            <div className="icon-circle" style={{ background: 'rgba(6,182,212,0.12)', color: 'var(--cyan)', fontSize: 20, minWidth: 44 }}>Q</div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 16, lineHeight: 1.5, marginBottom: 10 }}>{current.q}</div>
              <div className="why-box" style={{ background: 'rgba(6,182,212,0.06)', borderColor: 'rgba(6,182,212,0.2)', color: '#67E8F9' }}>
                <strong>💡 Why this question:</strong> {current.why}
              </div>
            </div>

          {current.choices.map((choice, i) => {
            let cls = 'ceo-choice';
            if (showResult) {
              if (choice === chosen) cls += choice.correct ? ' correct' : ' wrong';
              else if (choice.correct) cls += ' correct';
            }
            return (
              <div key={i} className={cls} onClick={() => !showResult && choose(choice)}>
                <div className="flex items-start gap8">
                  <span style={{ fontWeight: 700, color: 'var(--cyan)', flexShrink: 0 }}>{String.fromCharCode(65 + i)}.</span>
                  <span style={{ fontSize: 14, lineHeight: 1.5 }}>{choice.text}</span>
                </div>
              </div>
            );
          })}

          {showResult && (
            <div className="feedback-box success mt12" style={{ animation: 'fadeIn 0.3s ease' }}>
              <strong>{chosen.correct ? '✅ Correct!' : '❌ Not the optimal choice.'}</strong>
              <div style={{ marginTop: 6, fontSize: 13, lineHeight: 1.6 }}>{current.explanation}</div>
            </div>
          )}
        </div>

        {showResult && (
          <div className="flex justify-center">
            <button className="btn btn-primary" onClick={next}>
              {qIndex < CEO_QUESTIONS.length - 1 ? `Next Question →` : 'Proceed to AI Strategy →'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

              </div>
            );
          })}
        </div>

        <div className="why-box mb24" style={{ maxWidth: 860 }}>
          <strong>💡 Real-world context:</strong> Companies that invest in AI supply chain tools reduce disruption recovery time by an average of 43% (McKinsey, 2023). The gap between prepared and unprepared companies widens every year as AI tools become standard.
        </div>

        <div className="flex justify-center">
          <button
            className="btn btn-primary btn-lg"
            onClick={() => onNext(selected)}
            disabled={selected.length < MAX}
          >
            View Final Results →
          </button>
        </div>
      </div>
    </div>
  );
}

function ScoreRing({ score, size = 160 }) {
  const [displayed, setDisplayed] = useState(0);
  const r = 60;
  const circ = 2 * Math.PI * r;
  const offset = circ - (displayed / 100) * circ;
  const color = score >= 75 ? 'var(--emerald)' : score >= 50 ? 'var(--amber)' : 'var(--rose)';

  useEffect(() => {
    const t = setTimeout(() => setDisplayed(score), 200);
    return () => clearTimeout(t);
  }, [score]);

  return (
    <div className="score-ring" style={{ width: size, height: size }}>
      <svg width={size} height={size} viewBox="0 0 140 140">
        <circle cx="70" cy="70" r={r} fill="none" stroke="var(--surface3)" strokeWidth="10" />
        <circle
          cx="70" cy="70" r={r} fill="none"
          stroke={color}
          strokeWidth="10"
          strokeDasharray={circ}
          strokeDashoffset={offset}
          strokeLinecap="round"
          style={{ transition: 'stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1)', filter: `drop-shadow(0 0 8px ${color})` }}
        />
      </svg>
      <div className="score-ring-inner">
        <div className="mono" style={{ fontSize: '2.2rem', fontWeight: 800, lineHeight: 1, color }}>{displayed}</div>
        <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>/ 100</div>
      </div>
    </div>
  );
}

function FinalScreen({ company, crisis, warRoomActions, finalMetrics, negScore, ceoScore, aiInvestments, onReplay }) {
  const resilienceScore = Math.round((
    (finalMetrics.cost + finalMetrics.inventory + finalMetrics.deliverySpeed) / 3
  ));
  const costScore = finalMetrics.cost;
  const riskScore = Math.round(negScore * 0.6 + ceoScore * 0.4);
  const satisfactionScore = finalMetrics.satisfaction;
  const leadershipScore = ceoScore;
  const negScoreFinal = negScore;

  const overall = Math.round(
    (leadershipScore * 0.20) +
    (negScoreFinal * 0.20) +
    (resilienceScore * 0.20) +
    (costScore * 0.15) +
    (riskScore * 0.15) +
    (satisfactionScore * 0.10)
  );

  const selectedActions = warRoomActions.map(id => RESPONSE_ACTIONS.find(a => a.id === id));
  const bestAction = [...selectedActions].sort((a, b) => b.satisfaction - a.satisfaction)[0];

  const selectedAI = aiInvestments.map(id => AI_INVESTMENTS.find(a => a.id === id));

  const biggestMistake = (() => {
    if (costScore < 45) return 'Over-invested in costly emergency measures without balancing cost efficiency';
    if (satisfactionScore < 45) return 'Prioritized operational metrics at the expense of customer communication';
    if (leadershipScore < 50) return 'Leadership decisions trended toward short-term optics over long-term enterprise value';
    if (negScoreFinal < 50) return 'Negotiation tactics damaged supplier trust, creating future supply chain vulnerability';
    return 'Slight underinvestment in redundancy planning during the War Room phase';
  })();

  const bestDecision = (() => {
    if (leadershipScore >= 80) return 'Outstanding boardroom leadership — consistently prioritized enterprise value over optics';
    if (negScoreFinal >= 80) return 'Masterful negotiation — built trust while securing favorable terms for both parties';
    if (satisfactionScore >= 80) return 'Excellent customer-first thinking kept satisfaction high during extreme pressure';
    return bestAction ? `Deploying "${bestAction.title}" was the standout War Room decision` : 'Balanced approach to crisis response maintained operational continuity';
  })();

  const recommendation = (() => {
    if (overall >= 80) return 'You demonstrated elite crisis management. Your next step: formalize a supply chain resilience program and run quarterly simulations with your full leadership team.';
    if (overall >= 60) return 'Solid performance under pressure. Focus area: build a dual-source policy for your top 10 critical materials and invest in supplier risk monitoring before the next disruption.';
    return 'Crisis management needs development. Prioritize: (1) building inventory buffers to 45+ days, (2) pre-qualifying 2 backup suppliers per critical category, and (3) leadership coaching on communicating under uncertainty.';
  })();

  const subScores = [
    { label: 'Leadership Score', val: leadershipScore, color: 'cyan' },
    { label: 'Negotiation Score', val: negScoreFinal, color: 'violet' },
    { label: 'Resilience Score', val: resilienceScore, color: 'emerald' },
    { label: 'Cost Control', val: costScore, color: 'blue' },
    { label: 'Risk Management', val: riskScore, color: 'amber' },
    { label: 'Customer Satisfaction', val: satisfactionScore, color: 'rose' },
  ];

  return (
    <div className="screen">
      <div className="container">
        <StepTrail current={6} total={7} />

        <div className="text-center mb32">
          <div className="section-eyebrow mb8">Final Results</div>
          <h2 style={{ marginBottom: 16 }}>Crisis Management Report</h2>
          <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>{company.name} — {crisis.type}</div>
        </div>

        <div className="card card-glow-blue mb20" style={{ textAlign: 'center' }}>
          <div className="label mb16">Overall Crisis Score</div>
          <ScoreRing score={overall} />
          <div style={{ fontSize: 24, fontWeight: 800, marginBottom: 4, color: overall >= 75 ? 'var(--emerald)' : overall >= 50 ? 'var(--amber)' : 'var(--rose)' }}>
            {scoreLabel(overall)}
          </div>
          <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>
            {overall >= 75 ? 'You\'ve demonstrated elite supply chain crisis management.' :
             overall >= 55 ? 'You managed the crisis with several strong decisions, with room to grow.' :
             'The crisis took a significant toll — see recommendations below.'}
          </div>
        </div>

        <div className="card-sm mb16">
          <div className="label mb16">Score Breakdown</div>
          {subScores.map(s => (
            <div key={s.label} className="score-item">
              <div>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{s.label}</div>
                <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{scoreLabel(s.val)}</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, width: '45%' }}>
                <div style={{ flex: 1 }}><ProgressBar value={s.val} color={s.color} /></div>
                <div className="mono" style={{ fontSize: 14, fontWeight: 700, color: scoreColor(s.val), minWidth: 32, textAlign: 'right' }}>{s.val}</div>
              </div>
            </div>
          ))}
        </div>

        <div className="grid-2 mb16">
          <div className="card-sm">
            <div className="label mb8" style={{ color: '#FB7185' }}>⚠️ Biggest Mistake</div>
            <p style={{ fontSize: 13, lineHeight: 1.6, color: 'var(--text-muted)' }}>{biggestMistake}</p>
          </div>
          <div className="card-sm">
            <div className="label mb8" style={{ color: 'var(--emerald)' }}>🏆 Best Decision</div>
            <p style={{ fontSize: 13, lineHeight: 1.6, color: 'var(--text-muted)' }}>{bestDecision}</p>
          </div>
        </div>

        <div className="feedback-box mb16">
          <div className="label mb8" style={{ color: 'var(--blue-light)' }}>🎯 Expert Recommendation</div>
          <p style={{ fontSize: 14, lineHeight: 1.7 }}>{recommendation}</p>
        </div>

        {selectedAI.filter(Boolean).length > 0 && (
          <div className="card-sm mb16">
            <div className="label mb12">🤖 Your AI Investment Portfolio</div>
            <div className="grid-2">
              {selectedAI.filter(Boolean).map(ai => (
                <div key={ai.id} className="card-sm" style={{ background: 'var(--surface3)' }}>
                  <div className="flex items-center gap8 mb6">
                    <span style={{ fontSize: 18 }}>{ai.emoji}</span>
                    <span style={{ fontWeight: 700, fontSize: 13 }}>{ai.name}</span>
                  </div>
                  <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{ai.impactDesc}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div className="card-sm mb24">
          <div className="label mb12">📚 Lessons Learned</div>
          {LESSONS.map((lesson, i) => (
            <div key={i} className="lesson">
              <div className="lesson-num">{i + 1}</div>
              <p style={{ fontSize: 13, lineHeight: 1.6, color: 'var(--text-muted)' }}>{lesson}</p>
            </div>
          ))}
        </div>

        <div className="flex justify-center gap12 flex-wrap">
          <button className="replay-btn" onClick={onReplay}>
            🔄 Replay Simulation
          </button>
          <div className="card-sm flex items-center gap8" style={{ padding: '12px 20px' }}>
            <span style={{ fontSize: 13, color: 'var(--text-muted)' }}>Share your score:</span>
            <span className="mono" style={{ fontWeight: 700, color: 'var(--blue-light)' }}>{overall}/100</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ──────────────────────────────────────────────────────────────

function App() {
  const [screen, setScreen] = useState('welcome');
  const [company, setCompany] = useState(null);
  const [crisis, setCrisis] = useState(null);
  const [baseMetrics, setBaseMetrics] = useState(null);
  const [warRoomActions, setWarRoomActions] = useState([]);
  const [finalMetrics, setFinalMetrics] = useState(null);
  const [negScore, setNegScore] = useState(0);
  const [ceoScore, setCeoScore] = useState(0);
  const [aiInvestments, setAiInvestments] = useState([]);

  const start = () => {
    const co = generateCompany();
    const cr = generateCrisis(co);
    const bm = generateMetrics();
    setCompany(co);
    setCrisis(cr);
    setBaseMetrics(bm);
    setScreen('company');
  };

  const replay = () => {
    setScreen('welcome');
    setCompany(null);
    setCrisis(null);
    setBaseMetrics(null);
    setWarRoomActions([]);
    setFinalMetrics(null);
    setNegScore(0);
    setCeoScore(0);
    setAiInvestments([]);
  };

  const stepMap = {
    welcome: -1,
    company: 0,
    crisis: 1,
    warroom: 2,
    negotiation: 3,
    boardroom: 4,
    ai: 5,
    final: 6,
  };

  return (
    <div>
      {screen !== 'welcome' && (
        <TopBar step={stepMap[screen]} company={company} crisis={crisis} />
      )}

      {screen === 'welcome' && <WelcomeScreen onStart={start} />}
      {screen === 'company' && company && (
        <CompanyScreen company={company} onNext={() => setScreen('crisis')} />
      )}
      {screen === 'crisis' && company && crisis && (
        <CrisisScreen company={company} crisis={crisis} onNext={() => setScreen('warroom')} />
      )}
      {screen === 'warroom' && (
        <WarRoomScreen
          company={company}
          crisis={crisis}
          baseMetrics={baseMetrics}
          onNext={(actions, metrics) => {
            setWarRoomActions(actions);
            setFinalMetrics(metrics);
            setScreen('negotiation');
          }}
        />
      )}
      {screen === 'negotiation' && (
        <NegotiationScreen
          onNext={(score, stats) => {
            setNegScore(score);
            setScreen('boardroom');
          }}
        />
      )}
      {screen === 'boardroom' && (
        <BoardroomScreen
          onNext={(score) => {
            setCeoScore(score);
            setScreen('ai');
          }}
        />
      )}
      {screen === 'ai' && (
        <AIStrategyScreen
          onNext={(investments) => {
            setAiInvestments(investments);
            setScreen('final');
          }}
        />
      )}
      {screen === 'final' && company && crisis && finalMetrics && (
        <FinalScreen
          company={company}
          crisis={crisis}
          warRoomActions={warRoomActions}
          finalMetrics={finalMetrics}
          negScore={negScore}
          ceoScore={ceoScore}
          aiInvestments={aiInvestments}
          onReplay={replay}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
