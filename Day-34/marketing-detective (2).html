<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Detective</title>
<style>
  :root{
    --bg:#0a0a0b;
    --bg2:#141414;
    --board:#2b2018;
    --board2:#241a12;
    --paper:#efe6d0;
    --paper2:#e6dabc;
    --ink:#211d16;
    --red:#8f1d1d;
    --red-bright:#d64545;
    --gold:#c9a227;
    --text:#eae7e0;
    --muted:#a9a49a;
    --line:#3a3a3a;
    --shadow: rgba(0,0,0,0.6);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at 20% -10%, #1a1a1a 0%, transparent 60%),
      radial-gradient(ellipse at 90% 110%, #150c0c 0%, transparent 60%),
      var(--bg);
    color:var(--text);
    font-family: 'Courier New', Courier, monospace;
    min-height:100vh;
    overflow-x:hidden;
  }
  #app{min-height:100vh; display:flex; flex-direction:column;}
  h1,h2,h3{ font-family: Georgia, 'Times New Roman', serif; letter-spacing:0.5px; margin:0;}
  ::selection{ background: var(--red-bright); color:#fff;}
  .noir-title{
    font-family: Georgia, serif;
    color: var(--text);
    text-shadow: 0 0 18px rgba(214,69,69,0.35);
  }
  .accent{color:var(--red-bright);}
  .gold{color:var(--gold);}
  button{
    font-family:inherit;
    cursor:pointer;
    border:none;
    outline:none;
  }
  .btn{
    background: linear-gradient(180deg,#2a2a2a,#151515);
    color:var(--text);
    border:1px solid var(--line);
    padding:12px 22px;
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    border-radius:3px;
    transition: transform .15s ease, box-shadow .15s ease, background .2s ease, border-color .2s ease;
    box-shadow: 0 4px 0 rgba(0,0,0,0.4), 0 6px 14px rgba(0,0,0,0.4);
  }
  .btn:hover:not(:disabled){
    transform: translateY(-2px);
    border-color: var(--red-bright);
    box-shadow: 0 6px 0 rgba(0,0,0,0.4), 0 10px 20px rgba(214,69,69,0.25);
  }
  .btn:active:not(:disabled){ transform: translateY(1px); box-shadow:0 2px 0 rgba(0,0,0,.4);}
  .btn:disabled{ opacity:.35; cursor:not-allowed;}
  .btn-primary{
    background: linear-gradient(180deg, var(--red-bright), var(--red));
    border-color: #5a1414;
    color:#fff;
  }
  .btn-primary:hover:not(:disabled){ box-shadow:0 6px 0 rgba(0,0,0,.4), 0 10px 24px rgba(214,69,69,0.5);}

  /* ---------- top bar / progress ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 26px;
    background: linear-gradient(180deg, #101010, #0a0a0a);
    border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:50;
  }
  .brand{ display:flex; align-items:center; gap:10px; font-family:Georgia,serif; font-size:18px;}
  .brand .badge{
    width:28px;height:28px;border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--red-bright), var(--red) 60%, #400 100%);
    box-shadow: 0 0 10px rgba(214,69,69,.6), inset 0 0 6px rgba(0,0,0,.5);
    display:flex;align-items:center;justify-content:center;font-size:14px;
  }
  .progress{ display:flex; gap:6px; align-items:center;}
  .progress .dot{
    width:10px;height:10px;border-radius:50%;
    background:#333; border:1px solid var(--line);
    transition: all .3s ease;
    position:relative;
  }
  .progress .dot.active{ background:var(--red-bright); box-shadow:0 0 8px var(--red-bright);}
  .progress .dot.done{ background:var(--gold); }
  .progress-label{ font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; display:none;}
  @media(min-width:720px){ .progress-label{display:inline;} }

  .screen{ flex:1; display:flex; flex-direction:column; align-items:center; padding:30px 16px 60px; animation:fadeIn .5s ease;}
  @keyframes fadeIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- title screen ---------- */
  .title-screen{ text-align:center; max-width:720px; margin-top:6vh;}
  .title-screen .badge-lg{
    width:110px;height:110px;border-radius:50%; margin:0 auto 22px;
    background: radial-gradient(circle at 35% 30%, var(--red-bright), var(--red) 55%, #300 100%);
    box-shadow: 0 0 40px rgba(214,69,69,.55), inset 0 0 20px rgba(0,0,0,.6);
    display:flex;align-items:center;justify-content:center;font-size:52px;
    animation: pulseGlow 3s ease-in-out infinite;
  }
  @keyframes pulseGlow{ 0%,100%{box-shadow:0 0 40px rgba(214,69,69,.5);} 50%{box-shadow:0 0 60px rgba(214,69,69,.85);} }
  .title-screen h1{ font-size:44px; margin-bottom:10px;}
  .title-screen p.sub{ color:var(--muted); font-size:15px; line-height:1.7; margin-bottom:30px;}
  .stamp-line{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:10px; color:var(--muted); font-size:12px; letter-spacing:1px; text-transform:uppercase;}

  /* ---------- case folder (assignment) ---------- */
  .folder-wrap{ perspective:1200px; margin-top:10px;}
  .folder{
    width:min(560px,90vw);
    background: linear-gradient(160deg, var(--paper), var(--paper2));
    color: var(--ink);
    border-radius:4px 10px 10px 10px;
    box-shadow: 0 20px 50px var(--shadow), 0 2px 0 rgba(0,0,0,.2);
    position:relative;
    padding:34px 30px 26px;
    animation: folderOpen .6s ease;
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 1px, transparent 1px, transparent 3px);
  }
  @keyframes folderOpen{ from{ transform: rotateX(25deg) translateY(-20px); opacity:0;} to{ transform: rotateX(0) translateY(0); opacity:1;} }
  .folder:before{
    content:"CASE FILE";
    position:absolute; top:-18px; left:26px;
    background:var(--red); color:#fff; font-size:11px; letter-spacing:2px;
    padding:5px 14px; border-radius:2px; box-shadow:0 4px 10px rgba(0,0,0,.5);
  }
  .folder .stamp{
    position:absolute; top:16px; right:20px;
    border:3px solid var(--red); color:var(--red);
    font-family:Georgia,serif; font-weight:bold; font-size:13px;
    padding:5px 10px; border-radius:6px; transform:rotate(-12deg);
    opacity:.85; letter-spacing:1px;
  }
  .folder h2{ font-size:26px; margin-bottom:4px; color:var(--ink);}
  .folder .industry{ color:var(--red); font-size:13px; text-transform:uppercase; letter-spacing:1px; margin-bottom:18px; font-weight:bold;}
  .folder .field{ margin-bottom:14px;}
  .folder .field label{ display:block; font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:#7a6f4d; margin-bottom:3px;}
  .folder .field div{ font-size:14.5px; line-height:1.5;}
  .folder hr{ border:none; border-top:1px dashed #b9ac86; margin:18px 0;}
  .folder-actions{ display:flex; justify-content:center; margin-top:26px;}

  /* ---------- board layout ---------- */
  .board-layout{ width:100%; max-width:1180px; display:flex; flex-direction:column; gap:20px;}
  .hint-banner{
    text-align:center; color:var(--muted); font-size:13px; letter-spacing:.5px;
    background:rgba(255,255,255,0.03); border:1px dashed var(--line); border-radius:6px; padding:10px 16px;
  }
  .corkboard{
    width:100%; min-height:420px; border-radius:8px; position:relative;
    background-color: var(--board);
    background-image:
      radial-gradient(rgba(0,0,0,0.35) 1px, transparent 1.4px),
      radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1.4px);
    background-size: 7px 7px, 11px 11px;
    background-position: 0 0, 4px 5px;
    border:10px solid #1c140d;
    box-shadow: inset 0 0 60px rgba(0,0,0,.6), 0 20px 40px var(--shadow);
    padding:22px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px,1fr));
    gap:22px;
    align-content:start;
  }
  .corkboard.dragover{ box-shadow: inset 0 0 60px rgba(214,69,69,.35), 0 0 30px rgba(214,69,69,.4);}
  .tray{
    display:flex; gap:16px; flex-wrap:wrap; justify-content:center;
    padding:18px; background:rgba(255,255,255,0.02); border:1px solid var(--line); border-radius:8px;
  }

  .note{
    position:relative;
    background: var(--paper);
    color:var(--ink);
    width:170px; min-height:150px;
    padding:16px 12px 12px;
    border-radius:2px;
    box-shadow: 0 10px 18px rgba(0,0,0,.5);
    font-size:12.5px; line-height:1.45;
    transform:rotate(var(--rot,0deg));
    transition: transform .25s ease, box-shadow .25s ease;
    cursor:grab;
    user-select:none;
  }
  .note:hover{ transform:rotate(0deg) scale(1.04); box-shadow:0 16px 26px rgba(0,0,0,.6); z-index:5;}
  .note .pin{
    position:absolute; top:-9px; left:50%; transform:translateX(-50%);
    width:16px;height:16px;border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #ff6b6b, var(--red) 60%, #500 100%);
    box-shadow: 0 3px 5px rgba(0,0,0,.6), inset 0 0 3px rgba(0,0,0,.4);
  }
  .note .title{ font-weight:bold; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--red); margin-bottom:8px;}
  .note.locked{ filter:grayscale(.2);}
  .note.locked .redacted{
    display:block; height:10px; margin:5px 0; border-radius:2px;
    background: repeating-linear-gradient(90deg,#222 0,#222 6px,#2c2c2c 6px,#2c2c2c 12px);
    width:100%;
  }
  .note.locked .redacted:nth-child(3){width:70%;}
  .note.locked .redacted:nth-child(4){width:85%;}
  .note .stamp-classified{
    position:absolute; bottom:8px; right:8px; font-size:9px; letter-spacing:1px;
    color:var(--red); border:1px solid var(--red); padding:2px 6px; border-radius:3px; opacity:.8;
    transform:rotate(-8deg);
  }
  .note.flipping{ animation: flipReveal .5s ease;}
  @keyframes flipReveal{
    0%{ transform: rotateY(0deg) rotate(var(--rot,0deg));}
    50%{ transform: rotateY(90deg) rotate(0deg);}
    100%{ transform: rotateY(0deg) rotate(0deg);}
  }
  .note .body-content{ display:none; }
  .note.revealed .body-content{ display:block; animation: contentIn .4s ease .1s both;}
  .note.revealed .redacted, .note.revealed .stamp-classified{ display:none;}
  @keyframes contentIn{ from{opacity:0;} to{opacity:1;} }

  .bar-row{ display:flex; align-items:center; gap:6px; margin-bottom:6px; font-size:11px;}
  .bar-row .lbl{ width:40px; color:#5c5238; flex-shrink:0;}
  .bar-track{ flex:1; height:8px; background:#d8cba4; border-radius:4px; overflow:hidden;}
  .bar-fill{ height:100%; background: linear-gradient(90deg,var(--red),var(--red-bright)); width:0%; border-radius:4px; transition: width 1.1s cubic-bezier(.2,.9,.3,1);}
  .bar-val{ width:44px; text-align:right; font-size:10.5px; color:#4a4225; flex-shrink:0;}

  .quote{ font-style:italic; margin-bottom:6px; padding-left:6px; border-left:2px solid var(--red); font-size:11.5px;}

  .board-footer{ display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:6px;}
  .reveal-progress{ width:min(420px,90vw); height:10px; background:#222; border-radius:6px; overflow:hidden; border:1px solid var(--line);}
  .reveal-progress-fill{ height:100%; background:linear-gradient(90deg,var(--gold),#e9c65a); width:0%; transition:width .4s ease;}

  /* ---------- solve screen ---------- */
  .solve-wrap{ width:100%; max-width:820px; display:flex; flex-direction:column; gap:26px;}
  .solve-card{
    background:rgba(255,255,255,0.03); border:1px solid var(--line); border-radius:8px; padding:22px 22px 26px;
  }
  .solve-card h3{ font-size:15px; text-transform:uppercase; letter-spacing:1px; color:var(--gold); margin-bottom:14px;}
  .option{
    display:flex; align-items:flex-start; gap:10px;
    background:var(--paper); color:var(--ink); border-radius:4px; padding:12px 14px; margin-bottom:10px;
    cursor:pointer; font-size:13.5px; line-height:1.5; border:2px solid transparent;
    transition: all .2s ease;
  }
  .option:hover{ transform:translateX(4px); box-shadow:0 6px 14px rgba(0,0,0,.4);}
  .option.selected{ border-color:var(--red-bright); box-shadow:0 0 0 3px rgba(214,69,69,.25);}
  .option .marker{ width:18px;height:18px;flex-shrink:0; border:2px solid var(--red); border-radius:50%; margin-top:2px; position:relative;}
  .option.selected .marker:after{ content:""; position:absolute; inset:3px; background:var(--red); border-radius:50%;}
  .option.chk .marker{ border-radius:4px;}
  .clue-counter{ text-align:center; font-size:12px; color:var(--muted); margin-top:8px;}
  .solve-submit{ display:flex; justify-content:center; margin-top:6px;}

  /* ---------- case closed ---------- */
  .closed-screen{ flex:1; display:flex; align-items:center; justify-content:center; position:relative; min-height:60vh;}
  .stamp-final{
    font-family:Georgia,serif; font-weight:bold; color:var(--red-bright);
    font-size:min(15vw,90px); border:8px solid var(--red-bright); border-radius:14px;
    padding:14px 34px; transform:scale(3) rotate(-10deg); opacity:0; letter-spacing:4px;
    text-shadow:0 0 20px rgba(214,69,69,.7);
    animation: stampDown .6s cubic-bezier(.2,.9,.25,1.2) forwards;
    box-shadow:0 0 60px rgba(214,69,69,.4);
  }
  @keyframes stampDown{ 0%{ transform:scale(3) rotate(-10deg); opacity:0;} 60%{ transform:scale(0.92) rotate(-8deg); opacity:1;} 80%{transform:scale(1.05) rotate(-8deg);} 100%{ transform:scale(1) rotate(-8deg); opacity:1;} }
  .score-tag{ position:absolute; bottom:8vh; text-align:center; color:var(--muted); font-size:14px; animation: fadeIn 1s ease 1s both;}
  .score-tag .num{ font-size:34px; color:var(--gold); font-family:Georgia,serif; display:block;}
  .paper-fall{ position:fixed; top:-20px; width:10px;height:14px; background:var(--paper); opacity:.9; z-index:5; animation: fall linear forwards;}
  @keyframes fall{ to{ transform:translateY(110vh) rotate(400deg); opacity:0;} }

  /* ---------- report ---------- */
  .report-wrap{ width:100%; max-width:820px; display:flex; flex-direction:column; gap:20px;}
  .report-card{ background:var(--paper); color:var(--ink); border-radius:6px; padding:24px 26px; box-shadow:0 16px 30px var(--shadow); position:relative;}
  .report-card:before{ content:"DEBRIEF"; position:absolute; top:-14px; left:22px; background:var(--gold); color:#221; font-size:11px; letter-spacing:2px; padding:4px 12px; border-radius:2px; font-weight:bold;}
  .report-card h3{ color:var(--red); font-size:15px; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;}
  .report-card p{ font-size:14px; line-height:1.6; margin:0 0 14px;}
  .report-card ul{ margin:0; padding-left:20px; font-size:13.5px; line-height:1.7;}
  .stat-row{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center;}
  .stat-box{ background:rgba(255,255,255,0.03); border:1px solid var(--line); border-radius:8px; padding:16px 22px; text-align:center; min-width:120px;}
  .stat-box .n{ font-size:26px; color:var(--gold); font-family:Georgia,serif;}
  .stat-box .l{ font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-top:4px;}
  .report-actions{ display:flex; justify-content:center; gap:14px; flex-wrap:wrap;}

  @media(max-width:600px){
    .corkboard{ grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:14px; padding:14px;}
    .note{ width:100%;}
    .folder{ padding:26px 18px 20px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
"use strict";

/* ============================= DATA ============================= */
const CASES = [
{
  company:"Lumina Skincare Co.", industry:"Beauty & Cosmetics",
  objective:"Drive online sales of a new vitamin-C serum among Gen Z shoppers.",
  audience:"Women 18–24, urban, high social media usage, skincare-curious but not yet loyal to a brand.",
  channels:["Instagram Ads","TikTok Influencers","Email Newsletter","Google Search Ads"],
  budget:[{name:"Instagram",pct:40},{name:"TikTok Infl.",pct:35},{name:"Email",pct:15},{name:"Search",pct:10}],
  metrics:{reach:"2.4M",ctr:"0.4%",engagement:"1.8%",conversions:"320",sales:"$9,600"},
  comments:[
    `"Saw this everywhere on my feed but couldn't tell you what it actually does."`,
    `"The influencer videos were fun but never showed the price or where to buy it."`,
    `"Clicked three different links before I found the real store page."`
  ],
  social:"1.2M TikTok video views, but most comments ask 'wait what does this even do?'; only 900 saves across all platforms despite huge view count.",
  mistake:"The campaign optimized purely for reach and virality but never clearly stated the product's benefit or a direct call-to-action, so huge visibility never converted into sales.",
  clues:[
    "CTR is extremely low (0.4%) despite reaching 2.4M people — viewers scroll past without clicking.",
    "Customer comments repeatedly say they were confused about what the product does.",
    "Conversions (320) are tiny compared to reach and video views, showing a broken bottom-of-funnel."
  ],
  distractorClues:[
    "Budget allocation is skewed toward Instagram over other channels.",
    "The email newsletter has a below-average open rate.",
    "Google Search keywords are broad and untargeted."
  ],
  distractorMistakes:[
    "Budget was split too evenly across too many channels, diluting the impact of each.",
    "The target audience was defined too broadly, including people who cannot afford the product.",
    "The brand relied on a single influencer whose audience had already moved on."
  ],
  explanation:"Lumina's creative prioritized aesthetics and viral hooks over explaining the product's actual benefit. Influencer videos looked great and drove views, but never stated what the serum does, why it matters, or where/how much to buy — so massive reach never moved people down the funnel.",
  improvements:[
    "Add a clear benefit statement and CTA in the first 3 seconds of every video.",
    "Overlay 'what it does + price' text on all influencer content.",
    "Retarget engaged-but-not-converted viewers with a short explainer ad.",
    "Track click-to-product-page rate as a mid-funnel KPI, not just views."
  ]
},
{
  company:"NovaFit", industry:"Fitness & Wellness App",
  objective:"Acquire new paid subscribers for an at-home strength training app.",
  audience:"Marketing targeted 'elite young athletes 18-24' with high-intensity, competitive messaging.",
  channels:["YouTube Pre-roll","Instagram Ads","Affiliate Fitness Influencers","App Store Ads"],
  budget:[{name:"YouTube",pct:30},{name:"Instagram",pct:30},{name:"Affiliates",pct:25},{name:"App Store",pct:15}],
  metrics:{reach:"1.1M",ctr:"1.6%",engagement:"3.1%",conversions:"410",sales:"$6,150 MRR"},
  comments:[
    `"I'm 42 and just want to get back in shape — this ad made me feel like it's not for me."`,
    `"Looks intense. I want something beginner-friendly, not a bootcamp."`,
    `"Downloaded it, but churned after week one, the workouts assumed I already knew what I was doing."`
  ],
  social:"Actual paying subscribers skew 35-50 years old and beginner level, but 90% of ad spend targets competitive athletes 18-24 who rarely convert to paid plans.",
  mistake:"The campaign's targeting and messaging were aimed at elite young athletes, while the app's actual best-fit and highest-retention customers are older beginners — a fundamental audience mismatch.",
  clues:[
    "Customer comments show real users are older and want beginner-friendly content, not elite training.",
    "Engagement (3.1%) is decent but conversions and retention lag badly for the 18-24 segment reached.",
    "Actual paying subscriber data (35-50, beginner) contradicts the targeted persona (18-24, elite)."
  ],
  distractorClues:[
    "YouTube pre-roll ads have a lower completion rate than Instagram ads.",
    "The affiliate program pays a flat fee instead of performance-based commission.",
    "App Store ad creative hasn't been updated in two months."
  ],
  distractorMistakes:[
    "The app's onboarding flow has too many steps before the paywall.",
    "Affiliate influencers were paid flat fees instead of commission, misaligning incentives.",
    "The pricing page doesn't clearly show a free trial option."
  ],
  explanation:"NovaFit built its media plan around an aspirational 'elite athlete' persona because that content performs well on social media. But the churn and subscriber data reveal the real audience is older beginners who need reassurance and simplicity, not intensity — the ads were attracting the wrong people who never stick around.",
  improvements:[
    "Rebuild personas from actual paying/retained users, not aspirational targets.",
    "Create a distinct 'beginner' creative track and test it against the athlete track.",
    "Adjust onboarding to branch by fitness level shown in the ad they clicked.",
    "Shift budget toward channels/audiences matching the 35-50 beginner segment."
  ]
},
{
  company:"QuickBite", industry:"Food Delivery",
  objective:"Grow weekly active users in three metro markets via a discount-driven acquisition push.",
  audience:"Urban professionals aged 25-40 who order lunch and dinner delivery 3+ times per week.",
  channels:["Paid Social","Push Notifications","Out-of-Home Ads","Referral Program"],
  budget:[{name:"Paid Social",pct:45},{name:"Push",pct:10},{name:"OOH",pct:30},{name:"Referral",pct:15}],
  metrics:{reach:"3.8M",ctr:"1.1%",engagement:"2.0%",conversions:"22,000 signups",sales:"$310,000 (month 1)"},
  comments:[
    `"Got 40% off my first order, but delivery was an hour late and cold."`,
    `"Every ad I see is a new-user discount — nothing for people who already order weekly."`,
    `"Support never responded when my order arrived missing items."`
  ],
  social:"Signups surged 60% during the push, but app-store rating dropped from 4.3 to 3.4 in the same period, driven by complaints about late/cold deliveries and unresponsive support.",
  mistake:"The campaign poured budget into acquiring new users with steep discounts while ignoring rising complaints about delivery reliability and support — growth outpaced operational capacity, damaging retention and reputation.",
  clues:[
    "App-store rating fell sharply (4.3 to 3.4) during the very period signups surged.",
    "Customer comments focus overwhelmingly on late/cold deliveries and poor support, not on marketing.",
    "All campaign messaging targets brand-new users; nothing rewards or reassures existing weekly customers."
  ],
  distractorClues:[
    "Out-of-home ad spend was concentrated in only three neighborhoods.",
    "The referral program offers a smaller reward than competitors.",
    "Push notification frequency was capped at twice per day."
  ],
  distractorMistakes:[
    "The referral incentive was too small to motivate sharing.",
    "Out-of-home ads were placed in low-foot-traffic locations.",
    "Push notifications were sent at the wrong times of day."
  ],
  explanation:"QuickBite's acquisition machine worked exactly as designed — new signups and short-term sales spiked. But the campaign ignored operational signals (delivery times, order accuracy, support backlog) that couldn't keep pace with new demand, so the very growth it drove created a wave of bad experiences that tanked ratings and long-term trust.",
  improvements:[
    "Pause acquisition scaling until delivery-time and support SLAs are back within target.",

    "A/B test a simplified, mobile-first checkout against the current flow before scaling ad spend further."
  ]
}
];

/* ============================= STATE ============================= */
const state = {
  view:"title",
  caseIdx:-1,
  data:null,
  order:[],           // shuffled evidence keys
  revealed:{},        // key -> true
  selectedMistake:null,
  mistakeOptions:[],
  selectedClues:new Set(),
  clueOptions:[],
  score:0,
  lastCaseIdx:-1
};

const EVIDENCE_KEYS = ["objective","audience","channels","budget","metrics","comments","social"];
const EVIDENCE_LABELS = {
  objective:"Campaign Objective", audience:"Target Audience", channels:"Marketing Channels",
  budget:"Budget Allocation", metrics:"Campaign Metrics", comments:"Customer Comments", social:"Social Media Performance"
};

const STEPS = ["Assignment","Board","Investigate","Solve","Closed","Report"];

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function pickCase(){
  let idx;
  do{ idx = Math.floor(Math.random()*CASES.length); } while(CASES.length>1 && idx===state.lastCaseIdx);
  return idx;
}

/* ============================= RENDER HELPERS ============================= */
const app = document.getElementById("app");

function topbarHtml(stepIndex){
  const dots = STEPS.map((s,i)=>{
    let cls = "dot";
    if(i<stepIndex) cls += " done";
    else if(i===stepIndex) cls += " active";
    return `<div class="${cls}" title="${s}"></div>`;
  }).join("");
  const label = STEPS[stepIndex] || "";
  return `
  <div class="topbar">
    <div class="brand"><div class="badge">&#128269;</div> Marketing Detective</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="progress-label">${label}</span>
      <div class="progress">${dots}</div>
    </div>
  </div>`;
}

function render(){
  app.innerHTML = "";
  if(state.view==="title") return renderTitle();
  if(state.view==="assignment") return renderAssignment();
  if(state.view==="board") return renderBoard();
  if(state.view==="solve") return renderSolve();
  if(state.view==="closed") return renderClosed();
  if(state.view==="report") return renderReport();
}

/* ---------------- TITLE ---------------- */
function renderTitle(){
  app.innerHTML = `
    <div class="screen title-screen">
      <div class="badge-lg">&#128373;</div>
      <h1 class="noir-title">MARKETING <span class="accent">DETECTIVE</span></h1>
      <p class="sub">Somewhere in the files of a hundred failed campaigns lies the truth.
      Every case hides one critical mistake, buried under charts, comments, and cold hard numbers.
      Pin the evidence. Read between the lines. Crack the case.</p>
      <button class="btn btn-primary" id="startBtn">Take the Case</button>
      <div class="stamp-line"><span>12+ Case Files</span><span>&bull;</span><span>Confidential</span><span>&bull;</span><span>Est. 1948</span></div>
    </div>
  `;
  document.getElementById("startBtn").onclick = ()=>{
    state.caseIdx = pickCase();
    state.lastCaseIdx = state.caseIdx;
    state.data = CASES[state.caseIdx];
    state.revealed = {};
    state.selectedMistake = null;
    state.selectedClues = new Set();
    state.score = 0;
    state.view = "assignment";
    render();
  };
}

/* ---------------- ASSIGNMENT ---------------- */
function renderAssignment(){
  const c = state.data;
  app.innerHTML = `
    ${topbarHtml(0)}
    <div class="screen">
      <div class="folder-wrap">
        <div class="folder">
          <div class="stamp">TOP SECRET</div>
          <h2>${c.company}</h2>
          <div class="industry">${c.industry}</div>
          <div class="field"><label>Campaign Objective</label><div>${c.objective}</div></div>
          <div class="field"><label>Target Audience</label><div>${c.audience}</div></div>
          <hr>
          <div class="field"><label>Your Mission</label><div>Something in this campaign went wrong. Investigate the evidence board, uncover every clue, and identify the primary marketing mistake before you can close the case.</div></div>
          <div class="folder-actions">
            <button class="btn btn-primary" id="toBoard">Open Investigation Board &rarr;</button>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById("toBoard").onclick = ()=>{
    state.order = shuffle(EVIDENCE_KEYS);
    state.view = "board";
    render();
  };
}

/* ---------------- BOARD / INVESTIGATE ---------------- */
function evidenceBodyHtml(key, c){
  if(key==="channels"){
    return `<ul style="margin:0;padding-left:16px;">${c.channels.map(ch=>`<li>${ch}</li>`).join("")}</ul>`;
  }
  if(key==="budget"){
    return c.budget.map(b=>`
      <div class="bar-row"><span class="lbl">${b.name}</span><div class="bar-track"><div class="bar-fill" data-pct="${b.pct}"></div></div><span class="bar-val">${b.pct}%</span></div>
    `).join("");
  }
  if(key==="metrics"){
    const m = c.metrics;
    return `
      <div style="font-size:12.5px;line-height:1.9;">
        <div><b>Reach:</b> ${m.reach}</div>
        <div><b>CTR:</b> ${m.ctr}</div>
        <div><b>Engagement:</b> ${m.engagement}</div>
        <div><b>Conversions:</b> ${m.conversions}</div>
        <div><b>Sales:</b> ${m.sales}</div>
      </div>`;
  }
  if(key==="comments"){
    return c.comments.map(q=>`<div class="quote">${q}</div>`).join("");
  }
  if(key==="social"){
    return `<div>${c.social}</div>`;
  }
  // objective / audience
  return `<div>${c[key]}</div>`;
}

function renderBoard(){
  const c = state.data;
  const revealedCount = Object.keys(state.revealed).length;
  const total = EVIDENCE_KEYS.length;

  const cardsHtml = state.order.map((key,i)=>{
    const revealed = !!state.revealed[key];
    const rot = (i%2===0? -4-(i%3): 4+(i%3));
    return `
      <div class="note ${revealed? 'revealed':'locked'}" style="--rot:${rot}deg;" data-key="${key}" draggable="true">
        <div class="pin"></div>
        <div class="title">${EVIDENCE_LABELS[key]}</div>
        <div class="redacted"></div>
        <div class="redacted"></div>
        <div class="redacted"></div>
        <div class="redacted"></div>
        <span class="stamp-classified">CLASSIFIED</span>
        <div class="body-content">${evidenceBodyHtml(key,c)}</div>
      </div>
    `;
  }).join("");

  app.innerHTML = `
    ${topbarHtml(2)}
    <div class="screen">
      <div class="board-layout">
        <div class="hint-banner">Drag a folder onto the corkboard — or simply click it — to declassify the evidence inside.</div>
        <div class="corkboard" id="corkboard">${cardsHtml}</div>
        <div class="board-footer">
          <div class="reveal-progress"><div class="reveal-progress-fill" id="revealFill" style="width:${(revealedCount/total)*100}%;"></div></div>
          <div style="font-size:12px;color:var(--muted);">${revealedCount} / ${total} pieces of evidence declassified</div>
          <button class="btn btn-primary" id="toSolve" ${revealedCount<total? "disabled":""}>Solve the Case &rarr;</button>
        </div>
      </div>
    </div>
  `;

  const board = document.getElementById("corkboard");

  function revealCard(key, el){
    if(state.revealed[key]) return;
    state.revealed[key] = true;
    el.classList.add("flipping");
    el.classList.remove("locked");
    setTimeout(()=>{ el.classList.add("revealed"); el.classList.remove("flipping"); animateBars(el); }, 260);
    updateFooter();
  }

  function animateBars(el){
    el.querySelectorAll(".bar-fill").forEach(bar=>{
      const pct = bar.getAttribute("data-pct");
      requestAnimationFrame(()=>{ bar.style.width = pct+"%"; });
    });
  }

  function updateFooter(){
    const count = Object.keys(state.revealed).length;
    document.getElementById("revealFill").style.width = ((count/total)*100)+"%";
    document.querySelector(".board-footer div[style]").textContent = `${count} / ${total} pieces of evidence declassified`;
    document.getElementById("toSolve").disabled = count<total;
  }

  board.querySelectorAll(".note").forEach(note=>{
    note.addEventListener("click", ()=> revealCard(note.getAttribute("data-key"), note));
    note.addEventListener("dragstart", (e)=>{ e.dataTransfer.setData("text/plain", note.getAttribute("data-key")); });
  });
  board.addEventListener("dragover", (e)=>{ e.preventDefault(); board.classList.add("dragover"); });
  board.addEventListener("dragleave", ()=> board.classList.remove("dragover"));
  board.addEventListener("drop", (e)=>{
    e.preventDefault();
    board.classList.remove("dragover");
    const key = e.dataTransfer.getData("text/plain");
    const el = board.querySelector(`.note[data-key="${key}"]`);
    if(el) revealCard(key, el);
  });

  document.getElementById("toSolve").onclick = ()=>{
    prepareSolveOptions();
    state.view = "solve";
    render();
  };
}

/* ---------------- SOLVE ---------------- */
function prepareSolveOptions(){
  const c = state.data;
  state.mistakeOptions = shuffle([c.mistake, ...c.distractorMistakes]);
  state.clueOptions = shuffle([...c.clues, ...c.distractorClues]);
  state.selectedMistake = null;
  state.selectedClues = new Set();
}

function renderSolve(){
  const c = state.data;
  const mistakeHtml = state.mistakeOptions.map((m,i)=>`
    <div class="option ${state.selectedMistake===i? 'selected':''}" data-idx="${i}">
      <div class="marker"></div><div>${m}</div>
    </div>
  `).join("");
  const clueHtml = state.clueOptions.map((cl,i)=>`
    <div class="option chk ${state.selectedClues.has(i)? 'selected':''}" data-idx="${i}">
      <div class="marker"></div><div>${cl}</div>
    </div>
  `).join("");

  app.innerHTML = `
    ${topbarHtml(3)}
    <div class="screen">
      <div class="solve-wrap">
        <div class="solve-card">
          <h3>Step 1 &mdash; Identify the Primary Marketing Mistake</h3>
          <div id="mistakeOptions">${mistakeHtml}</div>
        </div>
        <div class="solve-card">
          <h3>Step 2 &mdash; Select the Three Supporting Clues</h3>
          <div id="clueOptions">${clueHtml}</div>
          <div class="clue-counter" id="clueCounter">${state.selectedClues.size} / 3 selected</div>
        </div>
        <div class="solve-submit">
          <button class="btn btn-primary" id="submitBtn" disabled>Close the Case</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById("mistakeOptions").querySelectorAll(".option").forEach(opt=>{
    opt.onclick = ()=>{
      state.selectedMistake = parseInt(opt.getAttribute("data-idx"),10);
      renderSolve();
    };
  });
  document.getElementById("clueOptions").querySelectorAll(".option").forEach(opt=>{
    opt.onclick = ()=>{
      const idx = parseInt(opt.getAttribute("data-idx"),10);
      if(state.selectedClues.has(idx)) state.selectedClues.delete(idx);
      else if(state.selectedClues.size<3) state.selectedClues.add(idx);
      renderSolve();
    };
  });
  const submitBtn = document.getElementById("submitBtn");
  submitBtn.disabled = !(state.selectedMistake!==null && state.selectedClues.size===3);
  submitBtn.onclick = ()=>{
    computeScore();
    state.view = "closed";
    render();
  };
}

function computeScore(){
  const c = state.data;
  let score = 20; // investigation completion bonus
  if(state.mistakeOptions[state.selectedMistake]===c.mistake) score += 50;
  let correctClueCount = 0;
  state.selectedClues.forEach(i=>{
    if(c.clues.includes(state.clueOptions[i])) correctClueCount++;
  });
  score += correctClueCount*10;
  state.score = score;
  state.correctClueCount = correctClueCount;
  state.mistakeCorrect = state.mistakeOptions[state.selectedMistake]===c.mistake;
}

/* ---------------- CASE CLOSED ---------------- */
function renderClosed(){
  app.innerHTML = `
    ${topbarHtml(4)}
    <div class="screen closed-screen">
      <div class="stamp-final">CASE CLOSED</div>
      <div class="score-tag"><span class="num">${state.score}</span> / 100 Detective Score</div>
    </div>
  `;
  // falling papers
  for(let i=0;i<24;i++){
    const p = document.createElement("div");
    p.className = "paper-fall";
    p.style.left = (Math.random()*100)+"vw";
    p.style.animationDuration = (2.5+Math.random()*2.5)+"s";
    p.style.animationDelay = (Math.random()*0.8)+"s";
    p.style.background = Math.random()>0.5? "var(--paper)":"#d8cba4";
    document.body.appendChild(p);
    setTimeout(()=>{ p.remove(); }, 6000);
  }
  setTimeout(()=>{
    const cont = document.createElement("div");
    cont.style.cssText = "display:flex;justify-content:center;margin-top:6vh;position:relative;z-index:6;";
    cont.innerHTML = `<button class="btn btn-primary" id="toReport">View Full Report &rarr;</button>`;
    document.querySelector(".closed-screen").appendChild(cont);
    document.getElementById("toReport").onclick = ()=>{ state.view="report"; render(); };
  }, 1200);
}

/* ---------------- REPORT ---------------- */
function renderReport(){
  const c = state.data;
  app.innerHTML = `
    ${topbarHtml(5)}
    <div class="screen">
      <div class="report-wrap">
        <div class="stat-row">
          <div class="stat-box"><div class="n">${state.score}</div><div class="l">Detective Score</div></div>
          <div class="stat-box"><div class="n">${state.mistakeCorrect? "YES":"NO"}</div><div class="l">Root Cause Found</div></div>
          <div class="stat-box"><div class="n">${state.correctClueCount}/3</div><div class="l">Clues Confirmed</div></div>
        </div>
        <div class="report-card">
          <h3>${c.company} &mdash; What Really Happened</h3>
          <p><b>Primary Mistake:</b> ${c.mistake}</p>
          <p>${c.explanation}</p>
        </div>
        <div class="report-card">
          <h3>Suggested Improvements</h3>
          <ul>${c.improvements.map(i=>`<li>${i}</li>`).join("")}</ul>
        </div>
        <div class="report-actions">
          <button class="btn btn-primary" id="newCase">Investigate a New Case</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById("newCase").onclick = ()=>{
    state.view = "title";
    render();
    // auto-jump straight into a new case for faster replay
    setTimeout(()=>{ document.getElementById("startBtn").click(); }, 10);
  };
}

/* ============================= INIT ============================= */
render();

})();
</script>
</body>
</html>
