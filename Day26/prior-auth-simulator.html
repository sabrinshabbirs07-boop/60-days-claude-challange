<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prior Authorization Workflow Simulator</title>
<style>
  /* ============================================================
     DESIGN TOKENS
     Blues: deep navy #0A1628, slate #1E3A5F, mid #2563EB,
            bright #3B82F6, soft #BFDBFE, pale #EFF6FF
     Accents: emerald approval #059669, amber pend #D97706,
              red denial #DC2626, violet appeal #7C3AED
  ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #0A1628;
    --slate:  #1E3A5F;
    --mid:    #2563EB;
    --bright: #3B82F6;
    --soft:   #BFDBFE;
    --pale:   #EFF6FF;
    --white:  #FFFFFF;
    --gray50: #F8FAFC;
    --gray100:#F1F5F9;
    --gray200:#E2E8F0;
    --gray400:#94A3B8;
    --gray600:#475569;
    --gray800:#1E293B;
    --green:  #059669;
    --amber:  #D97706;
    --red:    #DC2626;
    --violet: #7C3AED;
    --teal:   #0891B2;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(10,22,40,.12);
    --shadow-lg: 0 8px 32px rgba(10,22,40,.18);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--navy);
    color: var(--gray800);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── Header ── */
  #header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--slate) 100%);
    padding: 16px 24px 0;
    border-bottom: 2px solid var(--mid);
    position: sticky; top: 0; z-index: 100;
  }
  #header-top {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 14px;
  }
  #header h1 {
    color: var(--white); font-size: 20px; font-weight: 700; letter-spacing: -.3px;
  }
  #header h1 span { color: var(--bright); }
  #header-stats {
    display: flex; gap: 18px; align-items: center; flex-wrap: wrap;
  }
  .stat-pill {
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15);
    border-radius: 20px; padding: 4px 14px; color: var(--soft);
    font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px;
  }
  .stat-pill .val { color: var(--white); font-size: 15px; }
  #btn-restart {
    background: var(--mid); color: var(--white); border: none;
    border-radius: var(--radius); padding: 8px 18px; font-weight: 700;
    cursor: pointer; font-size: 13px; transition: background .2s;
  }
  #btn-restart:hover { background: var(--bright); }

  /* ── Progress Bar ── */
  #progress-bar {
    display: flex; gap: 2px; padding-bottom: 0; overflow-x: auto;
    scrollbar-width: none;
  }
  #progress-bar::-webkit-scrollbar { display: none; }
  .prog-step {
    flex: 1 1 60px; min-width: 60px; padding: 6px 4px 10px;
    text-align: center; position: relative; cursor: default;
    transition: background .25s;
  }
  .prog-step .ps-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(255,255,255,.1); color: var(--gray400);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; margin-bottom: 3px;
    transition: all .3s;
  }
  .prog-step .ps-label {
    font-size: 10px; color: var(--gray400); line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .prog-step.done .ps-num { background: var(--green); color: var(--white); }
  .prog-step.done .ps-label { color: #6EE7B7; }
  .prog-step.active .ps-num { background: var(--bright); color: var(--white);
    box-shadow: 0 0 0 3px rgba(59,130,246,.35); }
  .prog-step.active .ps-label { color: var(--soft); font-weight: 600; }

  /* ── Main layout ── */
  #main { display: flex; gap: 0; height: calc(100vh - 120px); overflow: hidden; }

  /* ── Lanes ── */
  #lanes {
    display: flex; gap: 12px; flex: 1; padding: 16px;
    overflow-x: auto; overflow-y: hidden;
  }
  .lane {
    flex: 1 1 260px; min-width: 220px; display: flex; flex-direction: column;
    background: var(--pale); border-radius: var(--radius);
    border: 2px solid var(--soft); overflow: hidden;
  }
  .lane-header {
    padding: 12px 14px; font-weight: 700; font-size: 13px;
    letter-spacing: .5px; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .lane-header .lane-icon { font-size: 18px; }
  .lane-patient .lane-header  { background: #DBEAFE; color: #1E40AF; border-bottom: 2px solid #93C5FD; }
  .lane-provider .lane-header { background: #D1FAE5; color: #065F46; border-bottom: 2px solid #6EE7B7; }
  .lane-payer .lane-header    { background: #EDE9FE; color: #4C1D95; border-bottom: 2px solid #C4B5FD; }

  .lane-body {
    flex: 1; overflow-y: auto; padding: 10px; display: flex;
    flex-direction: column; gap: 8px; min-height: 200px;
  }
  .lane-body.drag-over {
    background: #DBEAFE; border: 2px dashed var(--bright);
    border-radius: 8px;
  }

  /* ── Cards ── */
  .card {
    background: var(--white); border-radius: var(--radius);
    border: 2px solid var(--gray200); padding: 12px;
    cursor: grab; user-select: none;
    box-shadow: var(--shadow); transition: box-shadow .2s, transform .15s, border-color .2s;
    position: relative;
  }
  .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); border-color: var(--bright); }
  .card.dragging { opacity: .45; transform: rotate(1.5deg) scale(.97); cursor: grabbing; }
  .card-tag {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px; margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .tag-surgery   { background: #DBEAFE; color: #1E40AF; }
  .tag-mri       { background: #D1FAE5; color: #065F46; }
  .tag-medication{ background: #FEF3C7; color: #92400E; }
  .tag-inpatient { background: #FCE7F3; color: #9D174D; }
  .card-name { font-weight: 700; font-size: 13px; color: var(--navy); margin-bottom: 2px; }
  .card-stage { font-size: 11px; color: var(--gray600); margin-bottom: 6px; }
  .card-days {
    font-size: 11px; color: var(--gray400); float: right;
    background: var(--gray100); border-radius: 10px; padding: 2px 7px;
  }
  .card-status {
    font-size: 11px; font-weight: 600; padding: 3px 8px;
    border-radius: 6px; display: inline-block; margin-top: 4px;
  }
  .status-pending    { background: #FEF3C7; color: #92400E; }
  .status-approved   { background: #D1FAE5; color: #065F46; }
  .status-denied     { background: #FEE2E2; color: #991B1B; }
  .status-pended     { background: #EDE9FE; color: #4C1D95; }
  .status-appeal     { background: #FEE2E2; color: #7F1D1D; }
  .status-p2p        { background: #DBEAFE; color: #1E40AF; }
  .card-progress-bar { height: 4px; background: var(--gray200); border-radius: 2px; margin-top: 8px; }
  .card-progress-fill { height: 100%; border-radius: 2px; background: var(--mid); transition: width .5s; }

  /* ── Sidebar panel ── */
  #sidebar {
    width: 320px; min-width: 280px; background: var(--white);
    border-left: 2px solid var(--gray200); display: flex; flex-direction: column;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 14px 16px; background: var(--slate); color: var(--white);
    font-weight: 700; font-size: 14px; border-bottom: 2px solid var(--mid);
    display: flex; align-items: center; gap: 8px;
  }
  #sidebar-body { flex: 1; overflow-y: auto; padding: 14px; }
  #action-area {
    padding: 14px; border-top: 2px solid var(--gray200);
    background: var(--gray50);
  }

  /* ── Step info box ── */
  .info-box {
    background: var(--pale); border: 1.5px solid var(--soft);
    border-radius: var(--radius); padding: 12px; margin-bottom: 12px;
  }
  .info-box h3 { color: var(--navy); font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .info-box p  { color: var(--gray600); font-size: 12px; line-height: 1.6; }
  .info-box .edu-note {
    margin-top: 8px; padding: 6px 10px; background: #FFF7ED;
    border-left: 3px solid var(--amber); border-radius: 4px;
    font-size: 11px; color: #92400E;
  }

  /* ── Doc checklist ── */
  .doc-list { list-style: none; }
  .doc-list li {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 0; border-bottom: 1px solid var(--gray100); font-size: 12px; color: var(--gray800);
  }
  .doc-list li:last-child { border-bottom: none; }
  .doc-check {
    width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--gray200);
    cursor: pointer; flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; transition: all .2s; background: var(--white);
  }
  .doc-check.checked { background: var(--green); border-color: var(--green); color: var(--white); }

  /* ── Outcome buttons ── */
  .outcome-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .outcome-btn {
    padding: 10px 8px; border-radius: var(--radius); border: 2px solid transparent;
    font-weight: 700; font-size: 12px; cursor: pointer; transition: all .2s;
    text-align: center; line-height: 1.3;
  }
  .outcome-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-approve { background: #D1FAE5; color: #065F46; border-color: #6EE7B7; }
  .btn-approve:hover { background: var(--green); color: var(--white); }
  .btn-pend    { background: #EDE9FE; color: #4C1D95; border-color: #C4B5FD; }
  .btn-pend:hover    { background: var(--violet); color: var(--white); }
  .btn-deny    { background: #FEE2E2; color: #991B1B; border-color: #FCA5A5; }
  .btn-deny:hover    { background: var(--red); color: var(--white); }
  .btn-p2p     { background: #DBEAFE; color: #1E40AF; border-color: #93C5FD; }
  .btn-p2p:hover     { background: var(--mid); color: var(--white); }
  .btn-appeal  { background: #FEE2E2; color: #7F1D1D; border-color: #FCA5A5; }
  .btn-appeal:hover  { background: #B91C1C; color: var(--white); }
  .btn-submit-appeal { background: var(--mid); color: var(--white); border-color: var(--mid);
    grid-column: 1 / -1; }
  .btn-submit-appeal:hover { background: var(--bright); }

  .action-btn {
    width: 100%; padding: 11px; background: var(--mid); color: var(--white);
    border: none; border-radius: var(--radius); font-weight: 700; font-size: 13px;
    cursor: pointer; transition: background .2s; margin-top: 8px;
  }
  .action-btn:hover  { background: var(--bright); }
  .action-btn:disabled { background: var(--gray200); color: var(--gray400); cursor: not-allowed; }
  .action-btn.secondary { background: var(--white); color: var(--mid);
    border: 2px solid var(--mid); }
  .action-btn.secondary:hover { background: var(--pale); }

  /* ── Efficiency meter ── */
  .eff-bar { height: 8px; background: var(--gray200); border-radius: 4px; margin: 6px 0 10px; overflow: hidden; }
  .eff-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--green), var(--mid));
    transition: width .6s cubic-bezier(.4,0,.2,1); }

  /* ── Celebration overlay ── */
  #celebration {
    display: none; position: fixed; inset: 0; background: rgba(10,22,40,.85);
    z-index: 999; flex-direction: column; align-items: center; justify-content: center;
  }
  #celebration.show { display: flex; }
  .celeb-box {
    background: var(--white); border-radius: 16px; padding: 40px 48px;
    text-align: center; max-width: 440px; width: 90%;
    box-shadow: 0 24px 80px rgba(0,0,0,.4); position: relative; overflow: hidden;
  }
  .celeb-emoji { font-size: 64px; margin-bottom: 12px; display: block; animation: bounce 1s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .celeb-box h2 { font-size: 26px; color: var(--navy); margin-bottom: 8px; }
  .celeb-box p  { color: var(--gray600); font-size: 14px; line-height: 1.6; margin-bottom: 18px; }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px; opacity: 0;
    animation: confettiFall 2.5s ease-in forwards;
  }
  @keyframes confettiFall {
    0%  { opacity: 1; transform: translateY(-40px) rotate(0deg); }
    100%{ opacity: 0; transform: translateY(380px) rotate(720deg); }
  }

  /* ── Summary modal ── */
  #summary-modal {
    display: none; position: fixed; inset: 0; background: rgba(10,22,40,.85);
    z-index: 998; align-items: center; justify-content: center;
  }
  #summary-modal.show { display: flex; }
  .summary-box {
    background: var(--white); border-radius: 16px; padding: 32px;
    max-width: 500px; width: 92%; max-height: 80vh; overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,.4);
  }
  .summary-box h2 { color: var(--navy); margin-bottom: 16px; font-size: 22px; }
  .sum-row { display: flex; justify-content: space-between; padding: 8px 0;
    border-bottom: 1px solid var(--gray100); font-size: 13px; }
  .sum-row:last-child { border-bottom: none; }
  .sum-label { color: var(--gray600); }
  .sum-val { font-weight: 700; color: var(--navy); }
  .timeline-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 0; border-left: 2px solid var(--soft); padding-left: 12px; margin-left: 6px;
    position: relative;
  }
  .timeline-item::before {
    content: ''; position: absolute; left: -6px; top: 12px;
    width: 10px; height: 10px; border-radius: 50%; background: var(--mid); border: 2px solid var(--white);
  }
  .timeline-item .tl-text { font-size: 12px; color: var(--gray600); }
  .timeline-item .tl-day  { font-size: 11px; color: var(--gray400); margin-left: auto; white-space: nowrap; }

  /* ── Helpers ── */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 700; }
  .badge-green  { background: #D1FAE5; color: #065F46; }
  .badge-red    { background: #FEE2E2; color: #991B1B; }
  .badge-amber  { background: #FEF3C7; color: #92400E; }
  .badge-violet { background: #EDE9FE; color: #4C1D95; }
  .badge-blue   { background: #DBEAFE; color: #1E40AF; }

  .section-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .8px; color: var(--gray400); margin: 12px 0 6px;
  }
  .divider { border: none; border-top: 1.5px solid var(--gray200); margin: 10px 0; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--soft); border-radius: 4px; }

  /* Empty lane state */
  .empty-lane {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--gray400); font-size: 12px; text-align: center; padding: 20px;
    border: 2px dashed var(--gray200); border-radius: 8px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    #main { flex-direction: column; height: auto; overflow: auto; }
    #sidebar { width: 100%; min-width: unset; border-left: none; border-top: 2px solid var(--gray200); }
    #lanes { height: 420px; }
  }
</style>
</head>
<body>

<!-- ============================================================
     HEADER
============================================================ -->
<div id="header">
  <div id="header-top">
    <h1>🏥 <span>Prior Auth</span> Workflow Simulator</h1>
    <div id="header-stats">
      <div class="stat-pill">👤 Patient: <span class="val" id="stat-patient">—</span></div>
      <div class="stat-pill">📅 Days: <span class="val" id="stat-days">0</span></div>
      <div class="stat-pill">⚡ Score: <span class="val" id="stat-score">100</span></div>
      <button id="btn-restart" onclick="restartSimulator()">↺ New Patient</button>
    </div>
  </div>
  <!-- Progress steps across top -->
  <div id="progress-bar"></div>
</div>

<!-- ============================================================
     MAIN AREA: LANES + SIDEBAR
============================================================ -->
<div id="main">
  <!-- Three workflow lanes -->
  <div id="lanes">
    <div class="lane lane-patient">
      <div class="lane-header"><span class="lane-icon">🧑‍⚕️</span> Patient</div>
      <div class="lane-body" id="lane-patient"
           ondragover="onDragOver(event,'patient')"
           ondragleave="onDragLeave(event,'patient')"
           ondrop="onDrop(event,'patient')">
      </div>
    </div>
    <div class="lane lane-provider">
      <div class="lane-header"><span class="lane-icon">🩺</span> Provider / Clinic</div>
      <div class="lane-body" id="lane-provider"
           ondragover="onDragOver(event,'provider')"
           ondragleave="onDragLeave(event,'provider')"
           ondrop="onDrop(event,'provider')">
      </div>
    </div>
    <div class="lane lane-payer">
      <div class="lane-header"><span class="lane-icon">🏦</span> Payer / Insurer</div>
      <div class="lane-body" id="lane-payer"
           ondragover="onDragOver(event,'payer')"
           ondragleave="onDragLeave(event,'payer')"
           ondrop="onDrop(event,'payer')">
      </div>
    </div>
  </div>

  <!-- Sidebar: step instructions + actions -->
  <div id="sidebar">
    <div id="sidebar-header">📋 Step Instructions</div>
    <div id="sidebar-body">
      <p style="color:var(--gray400);font-size:13px;text-align:center;margin-top:40px;">
        Select a patient scenario to begin the simulation.
      </p>
    </div>
    <div id="action-area"></div>
  </div>
</div>

<!-- Celebration overlay -->
<div id="celebration">
  <div class="celeb-box" id="celeb-box">
    <span class="celeb-emoji">🎉</span>
    <h2 id="celeb-title">Authorization Approved!</h2>
    <p id="celeb-msg"></p>
    <button class="action-btn" onclick="showSummary()">View Full Summary</button>
    <button class="action-btn secondary" style="margin-top:8px" onclick="restartSimulator()">Try Another Case</button>
  </div>
</div>

<!-- Summary modal -->
<div id="summary-modal">
  <div class="summary-box">
    <h2>📊 Workflow Summary</h2>
    <div id="summary-content"></div>
    <button class="action-btn" style="margin-top:20px" onclick="closeSummary()">Close</button>
    <button class="action-btn secondary" style="margin-top:8px" onclick="restartSimulator()">Try Another Case</button>
  </div>
</div>

<script>

/* ============================================================

let state = {

  currentStepId: null,      // current STEP id
  cards: {},                // { cardId: { lane, stepId, ... } }
  daysElapsed: 0,           // counter
  efficiencyScore: 100,     // starts at 100, deducted for pends/denials
  docsChecked: [],          // array of checked doc indices
  timeline: [],             // array of { text, day }
  outcome: null,            // 'approved' | 'denied'
  dragCardId: null,         // which card is being dragged
  completedStepIds: [],     // for progress bar
  pendCount: 0,
  denialCount: 0,
};

/* ============================================================
   PROGRESS BAR STEPS (display order)
============================================================ */
const PROGRESS_STEPS = [
  { id: "referral",      label: "Referral" },
  { id: "clinical_eval", label: "Clinical Eval" },
  { id: "doc_collection",label: "Docs" },
  { id: "pa_submission", label: "Submission" },
  { id: "payer_review",  label: "Payer Review" },
  { id: "outcome",       label: "Outcome" },
  { id: "resolution",    label: "Resolution" },
];

/* ============================================================
   INITIALIZATION
============================================================ */
window.addEventListener("DOMContentLoaded", () => {
  renderProgressBar();
  showScenarioSelector();
});

function renderProgressBar() {
  const bar = document.getElementById("progress-bar");
  bar.innerHTML = "";
  PROGRESS_STEPS.forEach((ps, i) => {
    const div = document.createElement("div");
    div.className = "prog-step";
    div.id = "ps-" + ps.id;
    div.innerHTML = `<div class="ps-num">${i + 1}</div><div class="ps-label">${ps.label}</div>`;
    bar.appendChild(div);
  });
}

function updateProgressBar() {
  const active = getCurrentProgressId();
  PROGRESS_STEPS.forEach((ps, i) => {
    const el = document.getElementById("ps-" + ps.id);
    if (!el) return;
    el.classList.remove("active", "done");
    if (state.completedStepIds.includes(ps.id)) el.classList.add("done");
    else if (ps.id === active) el.classList.add("active");
  });
}

function getCurrentProgressId() {
  const map = {
    referral: "referral",
    clinical_eval: "clinical_eval",
    doc_collection: "doc_collection",
    pa_submission: "pa_submission",
    payer_review: "payer_review",
    pended: "payer_review",
    approved: "outcome",
    denied: "outcome",
    p2p: "outcome",
    p2p_outcome: "outcome",
    appeal: "resolution",
    appeal_review: "resolution",
  };
  return map[state.currentStepId] || "referral";
}

/* ============================================================
   SCENARIO SELECTOR
============================================================ */
function showScenarioSelector() {
  const body = document.getElementById("sidebar-body");
  const area = document.getElementById("action-area");

  body.innerHTML = `
    <div class="info-box">

      <div class="edu-note">💡 Each decision carries real-world consequences: pends cost days, denials cost score points, and appeals test your knowledge of the appeals process.</div>
    </div>
    <div class="section-label">Choose a Patient Case</div>
  `;

  SCENARIOS.forEach(sc => {
    const tagMap = {
      surgery: "tag-surgery", mri: "tag-mri",
      medication: "tag-medication", inpatient: "tag-inpatient"
    };
    const card = document.createElement("div");
    card.className = "card";
    card.style.cursor = "pointer";
    card.style.marginBottom = "8px";
    card.innerHTML = `
      <span class="card-tag ${tagMap[sc.tag]}">${sc.type}</span>
      <div class="card-name">${sc.name}, ${sc.age}</div>
      <div class="card-stage">${sc.procedure}</div>
      <div style="font-size:11px;color:var(--gray600);margin-top:4px;line-height:1.5;">${sc.description.substring(0,100)}…</div>
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
        <span class="badge badge-blue">${sc.insurer}</span>
        <span class="badge badge-amber">${sc.urgency}</span>
      </div>

    card.addEventListener("click", () => startScenario(sc.id));

  });

  area.innerHTML = "";
}

/* ============================================================
   START A SCENARIO
============================================================ */
function startScenario(scenarioId) {
  const sc = SCENARIOS.find(s => s.id === scenarioId);
  if (!sc) return;

  // Reset state
  state = {
    scenario: sc,
    currentStepId: "referral",
    cards: {},
    daysElapsed: 0,
    efficiencyScore: 100,
    docsChecked: [],
    timeline: [],
    outcome: null,
    dragCardId: null,
    completedStepIds: [],
    pendCount: 0,
    denialCount: 0,
  };

  // Update header stats
  document.getElementById("stat-patient").textContent = sc.name;
  updateStats();

  // Add the card to the patient lane
  const cardId = "card-" + sc.id;
  state.cards[cardId] = { lane: "patient", stepId: "referral" };
  addTimelineEvent("Case opened — referral initiated");

  // Render
  renderAllLanes();
  renderStep("referral", cardId);
  updateProgressBar();
}

/* ============================================================
   LANE RENDERING
============================================================ */
function renderAllLanes() {
  ["patient", "provider", "payer"].forEach(lane => renderLane(lane));
}

function renderLane(lane) {
  const el = document.getElementById("lane-" + lane);
  el.innerHTML = "";
  const laneCards = Object.entries(state.cards).filter(([, v]) => v.lane === lane);

  if (laneCards.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-lane";
    empty.textContent = "No active cases";
    el.appendChild(empty);
    return;
  }

  laneCards.forEach(([cardId, cardData]) => {
    el.appendChild(buildCard(cardId, cardData));
  });
}

function buildCard(cardId, cardData) {
  const sc = state.scenario;
  const step = STEPS.find(s => s.id === cardData.stepId);
  const tagMap = {
    surgery: "tag-surgery", mri: "tag-mri",
    medication: "tag-medication", inpatient: "tag-inpatient"
  };

  // Progress percentage
  const stepIndex = STEPS.findIndex(s => s.id === cardData.stepId);
  const pct = Math.round((stepIndex / (STEPS.length - 1)) * 100);

  // Status badge class
  const statusClass = {
    approved: "status-approved", denied: "status-denied",
    pended: "status-pended", p2p: "status-p2p",
    appeal: "status-appeal",
  }[cardData.status || ""] || "status-pending";
  const statusLabel = {
    approved: "Approved ✓", denied: "Denied ✗",
    pended: "Pended ⏸", p2p: "Peer-to-Peer 🔄",
    appeal: "Under Appeal 📤",
  }[cardData.status || ""] || "In Progress…";

  const div = document.createElement("div");
  div.className = "card";
  div.id = cardId;
  div.draggable = true;
  div.innerHTML = `
    <span class="card-days">Day ${state.daysElapsed}</span>
    <span class="card-tag ${tagMap[sc.tag]}">${sc.type}</span>
    <div class="card-name">${sc.name}</div>
    <div class="card-stage">${step ? step.label : cardData.stepId}</div>
    <div class="card-status ${statusClass}">${statusLabel}</div>
    <div class="card-progress-bar">
      <div class="card-progress-fill" style="width:${pct}%"></div>
    </div>
  `;
  div.addEventListener("dragstart", e => onDragStart(e, cardId));
  div.addEventListener("dragend", e => onDragEnd(e, cardId));
  div.addEventListener("click", () => renderStep(state.currentStepId, cardId));
  return div;
}

/* ============================================================
   DRAG AND DROP
============================================================ */
function onDragStart(e, cardId) {
  state.dragCardId = cardId;
  setTimeout(() => {
    const el = document.getElementById(cardId);
    if (el) el.classList.add("dragging");
  }, 0);
}
function onDragEnd(e, cardId) {
  state.dragCardId = null;
  const el = document.getElementById(cardId);
  if (el) el.classList.remove("dragging");
}
function onDragOver(e, lane) {
  e.preventDefault();
  const el = document.getElementById("lane-" + lane);
  el.classList.add("drag-over");
}
function onDragLeave(e, lane) {
  const el = document.getElementById("lane-" + lane);
  el.classList.remove("drag-over");
}
function onDrop(e, targetLane) {
  e.preventDefault();
  const el = document.getElementById("lane-" + targetLane);
  el.classList.remove("drag-over");

  if (!state.dragCardId) return;
  const card = state.cards[state.dragCardId];
  if (!card) return;

  const step = STEPS.find(s => s.id === state.currentStepId);
  if (!step) return;

  // Only allow dropping to the correct next lane
  if (targetLane !== step.nextLane && targetLane !== card.lane) {
    showToast(`⚠️ This card can only be moved to the ${capitalize(step.nextLane || card.lane)} lane at this step.`);
    return;
  }

  // If dropping to nextLane, advance the step
  if (targetLane === step.nextLane && targetLane !== card.lane) {
    advanceStep(state.dragCardId, step);
  }
}

/* ============================================================
   STEP RENDERING (SIDEBAR)
============================================================ */
function renderStep(stepId, cardId) {
  const step = STEPS.find(s => s.id === stepId);
  if (!step) return;

  const body = document.getElementById("sidebar-body");
  const area = document.getElementById("action-area");

  body.innerHTML = `
    <div class="info-box">
      <h3>${step.title}</h3>
      <p>${step.instructions}</p>
      <div class="edu-note">💡 <strong>Did you know?</strong> ${step.edu}</div>
    </div>
  `;

  // Phase-specific content
  switch (step.phase) {
    case "necessity":
      renderNecessityPhase(body, area, cardId);
      break;
    case "docs":
      renderDocsPhase(body, area, cardId);
      break;
    case "submit":
      renderSubmitPhase(body, area, cardId);
      break;
    case "outcome":
      renderOutcomePhase(body, area, cardId);
      break;
    case "denied":
      renderDeniedPhase(body, area, cardId);
      break;
    case "appeal":
      renderAppealPhase(body, area, cardId);
      break;
    case "appeal_outcome":
      renderAppealOutcomePhase(body, area, cardId);
      break;
    case "p2p_outcome":
      renderP2POutcomePhase(body, area, cardId);
      break;
    case "approved":
      renderApprovedFinal(body, area, cardId);
      break;
    default:
      renderInfoPhase(body, area, cardId, step);
      break;
  }
}

/* ── Phase: info (with next button) ── */
function renderInfoPhase(body, area, cardId, step) {
  const sc = state.scenario;

  // Show scenario details
  body.insertAdjacentHTML("beforeend", `
    <div class="section-label">Case Details</div>
    <div class="info-box" style="background:var(--white)">
      <div class="sum-row"><span class="sum-label">Patient</span><span class="sum-val">${sc.name}, ${sc.age}</span></div>
      <div class="sum-row"><span class="sum-label">Procedure</span><span class="sum-val" style="font-size:11px;text-align:right;max-width:180px">${sc.procedure}</span></div>
      <div class="sum-row"><span class="sum-label">Insurer</span><span class="sum-val" style="font-size:11px">${sc.insurer}</span></div>
      <div class="sum-row"><span class="sum-label">Urgency</span><span class="sum-val">${sc.urgency}</span></div>
      <div class="sum-row"><span class="sum-label">Days Elapsed</span><span class="sum-val">${state.daysElapsed}</span></div>
    </div>
    <div class="section-label">⬅️ Drag the card or click the button to advance</div>
  `);

  area.innerHTML = "";
  if (step.nextLane && step.nextStep) {
    const btn = document.createElement("button");
    btn.className = "action-btn";
    btn.textContent = step.actionLabel || "Advance →";
    btn.onclick = () => advanceStep(cardId, step);
    area.appendChild(btn);
  }
}

/* ── Phase: medical necessity ── */
function renderNecessityPhase(body, area, cardId) {
  const sc = state.scenario;
  let html = `<div class="section-label">Medical Necessity Factors</div><ul class="doc-list">`;
  sc.medicalNecessityFactors.forEach(f => {
    html += `<li>
      <span class="doc-check ${f.met ? "checked" : ""}">${f.met ? "✓" : ""}</span>
      <span>${f.label}</span>
      <span class="badge ${f.met ? "badge-green" : "badge-red"}" style="margin-left:auto">${f.met ? "Met" : "Not Met"}</span>
    </li>`;
  });
  html += `</ul>`;
  const metCount = sc.medicalNecessityFactors.filter(f => f.met).length;
  const total = sc.medicalNecessityFactors.length;
  html += `<div style="margin-top:12px;font-size:12px;color:var(--gray600)">
    Criteria met: <strong>${metCount}/${total}</strong> — ${metCount >= total - 1 ? "✅ Sufficient for submission" : "⚠️ Borderline — ensure documentation is thorough"}
  </div>`;

  body.insertAdjacentHTML("beforeend", html);

  const step = STEPS.find(s => s.id === "clinical_eval");
  area.innerHTML = "";
  const btn = document.createElement("button");
  btn.className = "action-btn";
  btn.textContent = step.actionLabel;
  btn.onclick = () => { advanceDays(1); advanceStep(cardId, step); };
  area.appendChild(btn);
}

/* ── Phase: document collection ── */
function renderDocsPhase(body, area, cardId) {
  const sc = state.scenario;
  const allChecked = () => state.docsChecked.length === sc.requiredDocs.length;

  function renderDocList() {
    let html = `<div class="section-label">Required Documents</div><ul class="doc-list" id="doc-list">`;
    sc.requiredDocs.forEach((doc, i) => {
      const checked = state.docsChecked.includes(i);
      html += `<li>
        <span class="doc-check ${checked ? "checked" : ""}" onclick="toggleDoc(${i},'${cardId}')" title="Click to mark collected">${checked ? "✓" : ""}</span>
        <span style="${checked ? "text-decoration:line-through;color:var(--gray400)" : ""}">${doc}</span>
      </li>`;
    });
    html += `</ul>
      <div style="margin-top:10px;font-size:12px;color:var(--gray600)">
        Collected: <strong>${state.docsChecked.length}/${sc.requiredDocs.length}</strong>
      </div>
      <div class="eff-bar"><div class="eff-fill" id="doc-eff-fill" style="width:${Math.round(state.docsChecked.length/sc.requiredDocs.length*100)}%"></div></div>
    `;
    return html;
  }

  // Replace doc section on re-render
  const existing = body.querySelector("#doc-section");
  if (existing) {
    existing.innerHTML = renderDocList();
  } else {
    const div = document.createElement("div");
    div.id = "doc-section";
    div.innerHTML = renderDocList();
    body.appendChild(div);
  }

  area.innerHTML = "";
  const step = STEPS.find(s => s.id === "doc_collection");
  const btn = document.createElement("button");
  btn.className = "action-btn";
  btn.id = "doc-proceed-btn";
  btn.textContent = allChecked() ? step.actionLabel : `Collect All Docs First (${state.docsChecked.length}/${sc.requiredDocs.length})`;
  btn.disabled = !allChecked();
  btn.onclick = () => { advanceDays(2); advanceStep(cardId, step); };
  area.appendChild(btn);
}

function toggleDoc(index, cardId) {
  const i = state.docsChecked.indexOf(index);
  if (i === -1) state.docsChecked.push(index);
  else state.docsChecked.splice(i, 1);
  renderDocsPhase(document.getElementById("sidebar-body"), document.getElementById("action-area"), cardId);
}

function renderSubmitPhase(body, area, cardId) {

  body.insertAdjacentHTML("beforeend", `
    <div class="section-label">Submission Checklist</div>
    <div class="info-box" style="background:var(--white)">

function selectMethod(el, method) {

/* ── Phase: payer outcome selection ── */
function renderOutcomePhase(body, area, cardId) {
  const sc = state.scenario;
  const approvalChance = sc.baseApprovalChance - (state.pendCount * 5);

  body.insertAdjacentHTML("beforeend", `
    <div class="section-label">Select Review Outcome</div>
    <div style="font-size:12px;color:var(--gray600);margin-bottom:10px;">
      This case has a <strong>${Math.max(approvalChance, 30)}%</strong> chance of approval based on the scenario. Choose the outcome to simulate.
    </div>
    <div class="outcome-grid">
      <button class="outcome-btn btn-approve" onclick="setOutcome('approved','${cardId}')">✅ Approved</button>
      <button class="outcome-btn btn-pend" onclick="setOutcome('pended','${cardId}')">⏸ Pended</button>
      <button class="outcome-btn btn-deny" onclick="setOutcome('denied','${cardId}')">❌ Denied</button>
      <button class="outcome-btn btn-p2p" onclick="setOutcome('p2p','${cardId}')">🔄 P2P Review</button>
    </div>
    <div style="margin-top:12px">
      <div class="section-label">Typical outcome for this case type</div>
      <p style="font-size:12px;color:var(--gray600)">${sc.approvalEdu}</p>
    </div>
  `);
  area.innerHTML = "";
}

function setOutcome(outcome, cardId) {
  advanceDays(state.scenario.typicalDays);
  const card = state.cards[cardId];
  if (!card) return;

  addTimelineEvent(`Payer review outcome: ${outcome.toUpperCase()}`);

  if (outcome === "approved") {
    card.stepId = "approved";
    card.status = "approved";
    card.lane = "payer";
    state.currentStepId = "approved";
    markProgressStep(["payer_review", "outcome"]);
    renderAllLanes();
    renderStep("approved", cardId);
    updateProgressBar();
  } else if (outcome === "pended") {
    state.pendCount++;
    state.efficiencyScore = Math.max(0, state.efficiencyScore - 15);
    advanceDays(3);
    card.stepId = "pended";
    card.status = "pended";
    card.lane = "payer";
    state.currentStepId = "pended";
    updateStats();
    renderAllLanes();
    renderStep("pended", cardId);
    updateProgressBar();
    addTimelineEvent("PA pended — additional docs requested");
  } else if (outcome === "denied") {
    state.denialCount++;
    state.efficiencyScore = Math.max(0, state.efficiencyScore - 25);
    card.stepId = "denied";
    card.status = "denied";
    card.lane = "payer";
    state.currentStepId = "denied";
    updateStats();
    markProgressStep(["payer_review", "outcome"]);
    renderAllLanes();
    renderStep("denied", cardId);
    updateProgressBar();
    addTimelineEvent("PA denied by payer");
  } else if (outcome === "p2p") {
    card.stepId = "p2p";
    card.status = "p2p";
    card.lane = "payer";
    state.currentStepId = "p2p";
    renderAllLanes();
    renderStep("p2p", cardId);
    updateProgressBar();
    addTimelineEvent("Peer-to-peer review requested");
  }
}

function renderP2POutcomePhase(body, area, cardId) {

function renderAppealPhase(body, area, cardId) {

/* ============================================================
   ADVANCE STEP (called from button OR drag-drop)
============================================================ */
function advanceStep(cardId, step) {
  if (!step.nextLane || !step.nextStep) return;

  const card = state.cards[cardId];
  if (!card) return;

  // Move card to next lane and step
  card.lane = step.nextLane;
  card.stepId = step.nextStep;
  state.currentStepId = step.nextStep;

  // Mark current step complete
  markProgressStep([getCurrentProgressId()]);
  addTimelineEvent(`Advanced to: ${step.nextStep.replace(/_/g, " ")}`);

  // Add days for payer steps
  if (step.nextStep === "payer_review") advanceDays(1);

  updateStats();
  renderAllLanes();
  renderStep(step.nextStep, cardId);
  updateProgressBar();
}

/* ============================================================
   HELPER ACTIONS
============================================================ */
function startP2P(cardId) {
  advanceDays(2);
  const card = state.cards[cardId];
  card.stepId = "p2p";
  card.status = "p2p";
  card.lane = "payer";
  state.currentStepId = "p2p";
  renderAllLanes();
  renderStep("p2p", cardId);
  updateProgressBar();
  addTimelineEvent("Peer-to-peer review requested by provider");
}

function startAppeal(cardId) {
  const card = state.cards[cardId];
  card.stepId = "appeal";
  card.status = "appeal";
  card.lane = "provider";
  state.currentStepId = "appeal";
  markProgressStep(["resolution"]);
  renderAllLanes();
  renderStep("appeal", cardId);
  updateProgressBar();
  addTimelineEvent("Formal appeal filed");
}

function p2pResult(result, cardId) {
  const card = state.cards[cardId];
  advanceDays(2);
  addTimelineEvent(`P2P outcome: ${result}`);

  if (result === "approved") {
    state.efficiencyScore = Math.min(100, state.efficiencyScore + 5);
    card.stepId = "approved";
    card.status = "approved";
    card.lane = "payer";
    state.currentStepId = "approved";
    markProgressStep(["outcome", "resolution"]);
    renderAllLanes();
    renderStep("approved", cardId);
    updateProgressBar();
    updateStats();
  } else {
    state.efficiencyScore = Math.max(0, state.efficiencyScore - 10);
    startAppeal(cardId);
    updateStats();
  }
}

function appealResult(result, cardId) {
  const card = state.cards[cardId];
  addTimelineEvent(`Appeal decision: ${result}`);

  if (result === "approved") {
    card.stepId = "approved";
    card.status = "approved";
    card.lane = "payer";
    state.currentStepId = "approved";
    markProgressStep(["outcome", "resolution"]);
    renderAllLanes();
    renderStep("approved", cardId);
    updateProgressBar();
    updateStats();
  } else {
    // External review — simplify as final denial with edu
    state.efficiencyScore = Math.max(0, state.efficiencyScore - 15);
    const body = document.getElementById("sidebar-body");
    const area = document.getElementById("action-area");
    body.innerHTML = `
      <div class="info-box" style="background:#FEF2F2;border-color:#FCA5A5">
        <h3>External Independent Review</h3>
        <p>The denial has been upheld at the internal appeal level. The patient may request an External Independent Review Organization (IRO) review — a neutral third-party bound by the state insurance commissioner.</p>
        <div class="edu-note" style="background:#FFF7ED;border-left-color:var(--amber)">
          💡 IRO decisions are binding on the insurer in most states. If the IRO overturns the denial, the payer must approve and cover the service.
        </div>
      </div>
    `;
    area.innerHTML = "";
    const btn = document.createElement("button");
    btn.className = "action-btn";
    btn.textContent = "↺ Try a Different Case";
    btn.onclick = restartSimulator;
    area.appendChild(btn);
    updateStats();
    addTimelineEvent("External IRO review requested — case concluded");
  }
}

/* ============================================================
   P2P INFO STEP (advance to p2p_outcome)
============================================================ */
// Override the "p2p" step rendering to show the info + button
const _origRenderStep = renderStep;
window.renderStep = function(stepId, cardId) {
  if (stepId === "p2p") {
    const step = STEPS.find(s => s.id === "p2p");
    const body = document.getElementById("sidebar-body");
    const area = document.getElementById("action-area");
    body.innerHTML = `
      <div class="info-box">
        <h3>${step.title}</h3>
        <p>${step.instructions}</p>
        <div class="edu-note">💡 <strong>Did you know?</strong> ${step.edu}</div>
      </div>
    `;
    const sc = state.scenario;
    body.insertAdjacentHTML("beforeend", `
      <div class="section-label">Preparation Checklist</div>
      <ul class="doc-list">
        <li><span class="doc-check checked">✓</span> Clinical case summary prepared</li>
        <li><span class="doc-check checked">✓</span> Medical literature citations ready</li>
        <li><span class="doc-check checked">✓</span> Denial reason rebuttal scripted</li>
        <li><span class="doc-check checked">✓</span> Specialist attestation in hand</li>
      </ul>
    `);
    area.innerHTML = "";
    const btn = document.createElement("button");
    btn.className = "action-btn";
    btn.textContent = "Conduct P2P Call — Select Outcome →";
    btn.onclick = () => {
      advanceDays(2);
      const card = state.cards[cardId];
      if (card) { card.stepId = "p2p_outcome"; state.currentStepId = "p2p_outcome"; }
      renderStep("p2p_outcome", cardId);
      updateProgressBar();
    };
    area.appendChild(btn);
    return;
  }
  _origRenderStep(stepId, cardId);
};

/* ============================================================
   UTILITIES
============================================================ */
function advanceDays(n) {
  state.daysElapsed += n;
  updateStats();
}

function updateStats() {
  document.getElementById("stat-days").textContent = state.daysElapsed;
  document.getElementById("stat-score").textContent = state.efficiencyScore;
}

function markProgressStep(ids) {
  ids.forEach(id => {
    if (!state.completedStepIds.includes(id)) state.completedStepIds.push(id);
  });
}

function addTimelineEvent(text) {
  state.timeline.push({ text, day: state.daysElapsed });
}

function capitalize(str) {
  return str ? str.charAt(0).toUpperCase() + str.slice(1) : "";
}

/* ── Toast notification ── */
function showToast(msg) {
  const t = document.createElement("div");
  t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--navy);color:var(--white);padding:10px 20px;border-radius:20px;
    font-size:13px;font-weight:600;z-index:9999;box-shadow:var(--shadow-lg);
    animation:fadeInUp .3s ease;pointer-events:none;`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

/* ============================================================
   CELEBRATION
============================================================ */
function triggerCelebration() {
  const sc = state.scenario;
  document.getElementById("celeb-title").textContent = "Authorization Approved! 🎉";
  document.getElementById("celeb-msg").textContent =
    `${sc.name}'s ${sc.type} PA has been approved after ${state.daysElapsed} days. Efficiency score: ${state.efficiencyScore}/100. ${sc.approvalEdu}`;

  const box = document.getElementById("celeb-box");
  // Remove old confetti
  box.querySelectorAll(".confetti-piece").forEach(e => e.remove());

  // Add confetti
  const colors = ["#3B82F6","#059669","#D97706","#7C3AED","#DC2626","#0891B2"];
  for (let i = 0; i < 30; i++) {
    const c = document.createElement("div");
    c.className = "confetti-piece";
    c.style.cssText = `
      left: ${Math.random() * 100}%;
      top: 0;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      border-radius: ${Math.random() > .5 ? "50%" : "2px"};
      width: ${6 + Math.random()*8}px;
      height: ${6 + Math.random()*8}px;
      animation-delay: ${Math.random() * 1.2}s;
      animation-duration: ${2 + Math.random()}s;
    `;
    box.appendChild(c);
  }

  document.getElementById("celebration").classList.add("show");
}

   SUMMARY MODAL

    <div class="sum-row"><span class="sum-label">Urgency</span><span class="sum-val">${sc.urgency}</span></div>
    <hr class="divider" />
    <div class="section-label">Performance Metrics</div>
    <div class="sum-row"><span class="sum-label">Total Days Elapsed</span><span class="sum-val">${state.daysElapsed} days</span></div>
    <div class="sum-row"><span class="sum-label">Efficiency Score</span><span class="sum-val">${state.efficiencyScore}/100</span></div>
    <div class="sum-row"><span class="sum-label">Times Pended</span><span class="sum-val">${state.pendCount}</span></div>
    <div class="sum-row"><span class="sum-label">Denials Encountered</span><span class="sum-val">${state.denialCount}</span></div>
    <div class="eff-bar" style="margin-top:8px"><div class="eff-fill" style="width:${state.efficiencyScore}%"></div></div>
    <div style="font-size:11px;color:var(--gray400);margin-bottom:12px">
      ${state.efficiencyScore >= 90 ? "🏆 Excellent — minimal delays" : state.efficiencyScore >= 70 ? "👍 Good — some rework needed" : "⚠️ Needs improvement — multiple pends/denials encountered"}
    </div>
    <hr class="divider" />
    <div class="section-label">Case Timeline</div>
  `;

  state.timeline.forEach(ev => {
    html += `<div class="timeline-item">
      <span class="tl-text">${ev.text}</span>
      <span class="tl-day">Day ${ev.day}</span>

      <p>${sc.approvalEdu}</p>

function closeSummary() {
  document.getElementById("summary-modal").classList.remove("show");
}

/* ============================================================
   RESTART
============================================================ */
function restartSimulator() {
  document.getElementById("celebration").classList.remove("show");
  document.getElementById("summary-modal").classList.remove("show");

  state = {
    scenario: null,
    currentStepId: null,
    cards: {},
    daysElapsed: 0,
    efficiencyScore: 100,
    docsChecked: [],
    timeline: [],
    outcome: null,
    dragCardId: null,
    completedStepIds: [],
    pendCount: 0,
    denialCount: 0,
  };

  document.getElementById("stat-patient").textContent = "—";
  document.getElementById("stat-days").textContent = "0";
  document.getElementById("stat-score").textContent = "100";

  // Clear lanes
  ["patient","provider","payer"].forEach(l => {
    const el = document.getElementById("lane-" + l);
    const empty = document.createElement("div");
    empty.className = "empty-lane";
    empty.textContent = "No active cases";
    el.innerHTML = "";
    el.appendChild(empty);
  });

  // Reset progress
  PROGRESS_STEPS.forEach(ps => {
    const el = document.getElementById("ps-" + ps.id);
    if (el) { el.classList.remove("active","done"); }
  });

  // Reset sidebar
  showScenarioSelector();
}
